<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVX PRO Lua Admin (OWNER)</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           LUA ADMIN OWNER - STYLE
           ========================================================================== */
        :root {
            --bg-body: #0f172a; --bg-panel: #1e293b; --primary: #ffd700; /* Gold for Owner */
            --text-main: #f1f5f9; --text-sub: #94a3b8; --border: #334155;
            --red: #ef4444; --green: #10b981; --yellow: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        body { background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--bg-panel); height: 100%; padding: 20px; border-right: 1px solid var(--border); transition: transform 0.3s ease; z-index: 1000; }
        .brand { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .brand span { color: white; }
        .close-btn { display: none; color: var(--text-sub); cursor: pointer; font-size: 20px; }

        .menu-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; color: var(--text-sub); font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover, .menu-item.active { background: var(--primary); color: #000; }

        /* MAIN CONTENT */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-header { padding: 15px 20px; border-bottom: 1px solid var(--border); background: var(--bg-body); display: flex; align-items: center; justify-content: space-between; }
        .top-header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }
        .btn-home { background: var(--border); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-decoration: none; }
        .btn-home:hover { background: var(--red); }

        .tab-content { padding: 20px; overflow-y: auto; height: 100%; }

        /* TOOLBAR & INPUTS */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select { background: var(--bg-panel); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; }
        .search { flex: 1; min-width: 200px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; color: #000; display: flex; align-items: center; gap: 5px; transition: 0.3s;}
        .btn-add { background: var(--primary); }
        .btn-add:hover { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .btn-cancel { background: transparent; border: 1px solid var(--border); color: white; }

        /* TABLE */
        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; background: var(--bg-panel); white-space: nowrap; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #151f32; color: var(--text-sub); font-size: 13px; text-transform: uppercase; }
        td { font-size: 14px; }

        /* BADGES & ACTIONS */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .b-active { background: #064e3b; color: #34d399; }
        .b-banned { background: #450a0a; color: #f87171; }

        .actions { display: flex; gap: 5px; }
        .act-btn { width: 28px; height: 28px; border-radius: 4px; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; color: white; transition: 0.2s;}
        .act-reset { background: var(--yellow); color: black; }
        .act-ban { background: #475569; }
        .act-ban.is-banned { background: var(--red); }
        .act-del { background: var(--red); }
        .act-btn:hover { transform: scale(1.1); }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: var(--bg-panel); width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-sub); }
        .form-group input, .form-group select { width: 100%; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }

        /* OVERLAY */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; top: 0; height: 100%; }
            .sidebar.active { left: 0; }
            .menu-toggle { display: block; }
            .close-btn { display: block; }
            .overlay.active { display: block; }
        }
    </style>
</head>
<body>

    <div class="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand">
            MVX <span>OWNER</span>
            <i class="fas fa-times close-btn" onclick="toggleSidebar()"></i>
        </div>
        
        <nav>
            <div class="menu-item active" onclick="showTab('users')">
                <i class="fas fa-users"></i> Key Manager
            </div>
            <div class="menu-item" onclick="showTab('settings')">
                <i class="fas fa-cogs"></i> System Config
            </div>
        </nav>
    </aside>

    <main class="content">
        <div class="top-header">
            <div class="top-header-left">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h2 id="pageTitle" style="color: var(--primary);">Key Manager (Full Access)</h2>
            </div>
            <button class="btn-home" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Exit</button>
        </div>

        <div id="tab-users" class="tab-content">
            <div class="toolbar">
                <input type="text" id="searchBox" class="search" placeholder="Search key or device model..." onkeyup="renderTable()">
                <button class="btn btn-add" onclick="openModal()">
                    <i class="fas fa-plus"></i> NEW KEY
                </button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Key / Token</th>
                            <th>Status</th>
                            <th>Expiry Date</th>
                            <th>Device Info</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTable">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-settings" class="tab-content" style="display: none;">
            <div style="background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px;">
                <h3 style="color: var(--yellow); margin-bottom: 10px;">⚠️ Global Version Control</h3>
                <p style="color: var(--text-sub); margin-bottom: 15px;">Set the active Lua script version. Older versions will force users to update.</p>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="appVer" value="1.0" step="0.1" style="width: 150px;">
                    <button class="btn btn-add" onclick="updateVersion()"><i class="fas fa-upload"></i> UPDATE</button>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="keyModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> Generate Master Key</h3>
                <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer;"></i>
            </div>
            
            <div class="form-group">
                <label>Key Name</label>
                <input type="text" id="newKey" placeholder="e.g. MVX_VIP_888">
            </div>
            
            <div class="form-group">
                <label>Duration (Owner Access)</label>
                <select id="duration">
                    <option value="1">1 Day</option>
                    <option value="7">7 Days</option>
                    <option value="30" selected>1 Month</option>
                    <option value="365">1 Year</option>
                </select>
            </div>

            <div class="form-group">
                <label>Device Limit</label>
                <select id="limit">
                    <option value="1">1 Device</option>
                    <option value="2">2 Devices</option>
                    <option value="3">3 Devices</option>
                    <option value="999">Unlimited Devices</option>
                </select>
            </div>

            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-add" onclick="createKey()"><i class="fas fa-check"></i> Create</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Security Check: Only allow if they entered '121345' from index.html
        if (sessionStorage.getItem('mvx_admin_token') !== 'SECURE_AUTHORIZED') {
            window.location.href = 'index.html'; // Redirect to store if bypassed
        }

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        let allUsers = {};

        function logoutAdmin() {
            sessionStorage.removeItem('mvx_admin_token');
            window.location.href = 'index.html';
        }

        // --- INITIALIZE APP ---
        function init() {
            db.ref('users').on('value', (snap) => {
                allUsers = snap.val() || {};
                renderTable();
            });

            db.ref('config/version').on('value', (snap) => {
                if(snap.val()) document.getElementById('appVer').value = snap.val();
            });
        }

        // --- RENDER TABLE ---
        function renderTable() {
            const tbody = document.getElementById('userTable');
            const search = document.getElementById('searchBox').value.toLowerCase();
            tbody.innerHTML = '';

            if (!allUsers) return;

            Object.keys(allUsers).reverse().forEach(key => {
                const user = allUsers[key];
                
                let deviceText = '<span style="color:#555; font-size:12px;">No Device Connected</span>';
                let deviceSearch = "";

                if (user.hwids) {
                    const models = Object.values(user.hwids).map(d => d.model || "Unknown").join(", ");
                    deviceSearch = models.toLowerCase();
                    
                    const used = Object.keys(user.hwids).length;
                    const max = user.maxDevices || 1;
                    const limitText = max == 999 ? "∞" : max;
                    
                    deviceText = `
                        <div style="font-size:12px; color:#94a3b8;">
                            <i class="fas fa-mobile-alt" style="color:var(--primary)"></i> ${models}
                            <br><span style="color:var(--green)">[${used} / ${limitText}]</span>
                        </div>
                    `;
                }

                if (key.toLowerCase().includes(search) || deviceSearch.includes(search)) {
                    const statusBadge = user.status === 'banned' 
                        ? '<span class="badge b-banned">BANNED</span>' 
                        : '<span class="badge b-active">ACTIVE</span>';

                    const row = `
                        <tr>
                            <td style="font-weight:bold; color:var(--text-main)">${key}</td>
                            <td>${statusBadge}</td>
                            <td>${user.expiry}</td>
                            <td>${deviceText}</td>
                            <td>
                                <div class="actions">
                                    <button class="act-btn act-reset" onclick="resetDevice('${key}')" title="Reset Hardware ID"><i class="fas fa-sync"></i></button>
                                    <button class="act-btn act-ban ${user.status === 'banned' ? 'is-banned' : ''}" onclick="toggleBan('${key}', '${user.status}')" title="Ban/Unban"><i class="fas fa-ban"></i></button>
                                    <button class="act-btn act-del" onclick="deleteUser('${key}')" title="Delete Key"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            });
        }

        // --- ACTIONS ---
        function createKey() {
            const key = document.getElementById('newKey').value.trim();
            const days = parseInt(document.getElementById('duration').value);
            const limit = parseInt(document.getElementById('limit').value);

            if(!key) return alert("Enter Key Name!");

            const date = new Date();
            date.setDate(date.getDate() + days);
            const expiry = date.toISOString().split('T')[0];

            db.ref('users/' + key).set({
                expiry: expiry,
                maxDevices: limit,
                status: 'active',
                hwids: null
            });
            closeModal();
        }

        function resetDevice(key) {
            if(confirm("Reset Device Lock for: " + key + "?")) {
                db.ref('users/' + key + '/hwids').remove();
            }
        }

        function toggleBan(key, status) {
            const newStatus = status === 'active' ? 'banned' : 'active';
            db.ref('users/' + key + '/status').set(newStatus);
        }

        function deleteUser(key) {
            if(confirm("Permanently Delete Key: " + key + "?")) {
                db.ref('users/' + key).remove();
            }
        }

        function updateVersion() {
            const ver = document.getElementById('appVer').value;
            db.ref('config/version').set(ver);
            alert("Script Version Updated to: " + ver);
        }

        // --- UI FUNCTIONS ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function showTab(tab) {
            document.getElementById('tab-users').style.display = 'none';
            document.getElementById('tab-settings').style.display = 'none';
            document.getElementById('tab-' + tab).style.display = 'block';
            
            document.getElementById('pageTitle').innerText = tab === 'users' ? 'Key Manager (Full Access)' : 'System Config';
            
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(window.innerWidth <= 768) toggleSidebar();
        }

        function openModal() {
            const rnd = "MVX_VIP_" + Math.floor(Math.random() * 90000 + 10000);
            document.getElementById('newKey').value = rnd;
            document.getElementById('keyModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('keyModal').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
