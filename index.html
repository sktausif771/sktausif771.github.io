<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVX STORE PRO</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary: #00e676;
            --bg: #080808;
            --card: #151515;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Header */
        header {
            height: 70px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }

        .logo-section { display: flex; align-items: center; gap: 10px; }
        .logo-section img { width: 40px; border-radius: 12px; box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); }

        .nav-icons i { margin-left: 20px; cursor: pointer; color: #888; transition: 0.3s; }
        .nav-icons i:hover { color: var(--primary); }

        /* Main Content */
        main { margin-top: 85px; padding-bottom: 100px; }

        /* Search */
        .search-area { padding: 15px; }
        .search-bar {
            background: var(--card); border-radius: 15px; display: flex; align-items: center;
            padding: 0 15px; border: 1px solid var(--glass);
        }
        .search-bar input {
            width: 100%; background: transparent; border: none; padding: 15px;
            color: white; outline: none;
        }

        /* App Grid Placeholder */
        .app-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        
        /* Empty State */
        .empty-box {
            text-align: center; padding: 50px 20px; color: #555;
            grid-column: span 2;
        }
        .empty-box i { font-size: 50px; margin-bottom: 10px; opacity: 0.3; }

        /* Modern Bottom Nav (For Settings/Home) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #111; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--glass); z-index: 1000;
        }
        .nav-item { text-align: center; color: #666; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Settings Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; display: none;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a1a; width: 85%; border-radius: 20px; padding: 25px;
            border: 1px solid var(--glass); position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; }
        
        .setting-option {
            display: flex; align-items: center; gap: 15px; padding: 15px 0;
            border-bottom: 1px solid var(--glass);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <img src="images/logo.png" alt="M">
            <h2 style="font-weight: 800;">MVX <span style="color:var(--primary)">STORE</span></h2>
        </div>
        <div class="nav-icons">
            <i class="fa fa-bell"></i>
            <i class="fa fa-user-circle" onclick="openSettings()"></i>
        </div>
    </header>

    <main>
        <div class="search-area">
            <div class="search-bar">
                <i class="fa fa-search"></i>
                <input type="text" placeholder="Search for premium apps...">
            </div>
        </div>

        <div class="app-grid" id="app-container">
            <div class="empty-box">
                <i class="fa fa-folder-open"></i>
                <p>No apps uploaded yet.<br>Use Admin Panel to add apps.</p>
            </div>
        </div>
    </main>

    <div class="bottom-nav">
        <div class="nav-item active">
            <i class="fa fa-home"></i> Home
        </div>
        <div class="nav-item" onclick="openSettings()">
            <i class="fa fa-cog"></i> Settings
        </div>
        <div class="nav-item">
            <i class="fa fa-download"></i> Downloads
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeSettings()">&times;</span>
            <h3 style="margin-bottom: 20px; color: var(--primary);">Settings</h3>
            
            <div class="setting-option">
                <i class="fa fa-moon"></i> Dark Mode (Always On)
            </div>
            <div class="setting-option">
                <i class="fa fa-shield-alt"></i> Security & Privacy
            </div>
            <div class="setting-option" onclick="location.href='login.html'">
                <i class="fa fa-sign-in-alt"></i> Login / Register
            </div>
            <div class="setting-option" style="color: #ff5252;" onclick="location.reload()">
                <i class="fa fa-refresh"></i> Clear Cache
            </div>
        </div>
    </div>

    <footer>
        <p id="admin-trigger" style="color: #333; cursor: pointer; margin-top: 20px;">Build v4.0.1 (STABLE)</p>
    </footer>

    <script>
        // Modal Logic
        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

        // Admin Access Logic (7 Clicks)
        let count = 0;
        document.getElementById('admin-trigger').onclick = () => {
            count++;
            if(count >= 7) {
                let p = prompt("Enter Admin Key:");
                if(p === "1213") window.location.href = "admin.html";
                else { alert("Access Denied!"); count = 0; }
            }
        };
    </script>
</body>
</html>
