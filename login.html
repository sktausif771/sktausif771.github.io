<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <meta name="robots" content="noindex, nofollow">
    <title>MVX SECURE LOGIN | Admin Portal v4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX ADMIN LOGIN PAGE V4.0
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --danger-dim: rgba(255, 0, 60, 0.15);
            --bg-void: #000000; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.85); --glass-border: 1px solid rgba(0, 230, 184, 0.3);
            --font-head: 'Orbitron', sans-serif; --font-body: 'Space Grotesk', sans-serif; --font-mono: 'Share Tech Mono', monospace;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        /* Cyber Background Effects */
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; animation: gridShift 10s linear infinite; }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, transparent 50%, rgba(0, 230, 184, 0.05) 50%); background-size: 100% 4px; pointer-events: none; z-index: 1; animation: scanMove 8s linear infinite; }
        .glow-orb { position: absolute; width: 50vmax; height: 50vmax; border-radius: 50%; background: radial-gradient(circle at center, rgba(0, 230, 184, 0.15) 0%, transparent 70%); filter: blur(60px); z-index: -1; }
        
        @keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
        @keyframes scanMove { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

        /* Login Container */
        .login-box { width: 100%; max-width: 420px; padding: 40px 30px; background: var(--glass-bg); backdrop-filter: blur(20px); border: var(--glass-border); border-radius: 20px; box-shadow: 0 0 40px var(--primary-dim); z-index: 5; text-align: center; position: relative; }
        .login-box::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, var(--primary), transparent, var(--primary)); z-index: -1; border-radius: 22px; opacity: 0.3; animation: borderGlow 3s linear infinite; }
        @keyframes borderGlow { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }

        /* Lock Icon */
        .lock-icon { width: 80px; height: 80px; margin: 0 auto 20px; background: var(--bg-input); border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--primary); box-shadow: 0 0 20px var(--primary-dim); position: relative; }
        .lock-icon::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px dashed var(--primary); animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .brand-title { font-family: var(--font-head); font-size: 1.8rem; letter-spacing: 2px; margin-bottom: 5px; color: #fff; text-shadow: 0 0 10px var(--primary); }
        .system-status { font-family: var(--font-mono); font-size: 0.8rem; color: var(--primary); margin-bottom: 30px; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .blink-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Inputs */
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; z-index: 2; transition: 0.3s; }
        .form-control { width: 100%; height: 55px; background: var(--bg-input); border: 1px solid #333; border-radius: 12px; padding: 0 20px 0 50px; color: #fff; font-family: var(--font-mono); font-size: 1rem; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }
        .form-control:focus + i { color: var(--primary); }

        /* Button */
        .btn-login { width: 100%; height: 55px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-login:hover { box-shadow: 0 0 25px var(--primary-dim); transform: translateY(-2px); }

        /* Toast */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-input); border-left: 4px solid var(--primary); padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; animation: slideIn 0.3s; font-family: var(--font-mono); font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .back-home { display: inline-block; margin-top: 25px; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.85rem; text-decoration: none; transition: 0.3s; }
        .back-home:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="login-box">
        <div class="lock-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="brand-title">MVX NEXUS</h1>
        <div class="system-status">
            <span class="blink-dot"></span> ADMIN AUTHENTICATION
        </div>

        <div class="input-group">
            <input type="email" id="adminEmail" class="form-control" placeholder="ACCESS EMAIL" autocomplete="off">
            <i class="fas fa-user-astronaut"></i>
        </div>
        <div class="input-group">
            <input type="password" id="adminPassword" class="form-control" placeholder="ACCESS CODE" autocomplete="off">
            <i class="fas fa-key"></i>
        </div>

        <button class="btn-login" onclick="attemptLogin()">
            <i class="fas fa-terminal"></i> INITIATE LOGIN
        </button>

        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> RETURN TO PUBLIC STORE</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Firebase Configuration (Same as your project)
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();

        // Check if already logged in as admin
        if (sessionStorage.getItem('mvx_admin_token')) {
            window.location.href = 'admin.html';
        }

        function showToast(msg, type='success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--primary)'}"></i> <span>${msg}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function attemptLogin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value.trim();

            if(!email || !password) {
                showToast('ACCESS DENIED: Credentials Required', 'error');
                return;
            }

            const btn = document.querySelector('.btn-login');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> VERIFYING...';
            btn.style.opacity = '0.8';

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Assuming successful login means valid admin
                    showToast('ACCESS GRANTED. Redirecting...');
                    
                    // Generate Session Token
                    sessionStorage.setItem('mvx_admin_token', 'SECURE_' + Date.now());
                    sessionStorage.setItem('login_timestamp', Date.now());
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                })
                .catch((error) => {
                    btn.innerHTML = '<i class="fas fa-terminal"></i> INITIATE LOGIN';
                    btn.style.opacity = '1';
                    showToast('ACCESS DENIED: Invalid Credentials', 'error');
                });
        }

        // Allow 'Enter' key to trigger login
        document.getElementById('adminPassword').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    </script>
</body>
</html>
