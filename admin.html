<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e676">
    <title>MVX Admin Nexus | Secure Control Panel v2.0</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&family=Share+Tech+Mono&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ===================================================================
           MVX ADMIN NEXUS - ULTIMATE CONTROL PANEL V2.0
           Integrated with 404 style, Firebase, Real-time updates
           =================================================================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-neon: #00e676;
            --primary-hover: #00c853;
            --primary-dim: rgba(0, 230, 118, 0.1);
            --primary-glow: 0 0 30px rgba(0, 230, 118, 0.3);
            
            --danger-core: #ff1744;
            --danger-dim: rgba(255, 23, 68, 0.1);
            --danger-glow: 0 0 30px rgba(255, 23, 68, 0.2);
            
            --gold-core: #FFD700;
            --gold-dim: rgba(255, 215, 0, 0.1);
            --gold-glow: 0 0 30px rgba(255, 215, 0, 0.2);
            
            --bg-void: #030303;
            --bg-panel: #0a0a0a;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            
            --border-dim: 1px solid #222;
            --border-glow: 1px solid rgba(0, 230, 118, 0.3);
            
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            
            --font-head: 'Rajdhani', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Poppins', sans-serif;
            
            --header-height: 70px;
            --sidebar-width: 280px;
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== CYBER GRID BACKGROUND (MATCHES 404) ========== */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 230, 118, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* ========== HEADER SECTION ========== */
        .admin-header {
            position: sticky;
            top: 0;
            height: var(--header-height);
            background: rgba(3, 3, 3, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: var(--border-dim);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-icon {
            font-size: 2rem;
            color: var(--primary-neon);
            filter: drop-shadow(0 0 10px var(--primary-neon));
            animation: pulse 2s infinite;
        }

        .brand-text h1 {
            font-family: var(--font-head);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-text span {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-dim);
            border: 1px solid var(--primary-neon);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-neon);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-neon);
            animation: blink 1.5s infinite;
        }

        .logout-btn {
            background: var(--danger-dim);
            border: 1px solid var(--danger-core);
            color: var(--danger-core);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger-core);
            color: #000;
            box-shadow: var(--danger-glow);
            transform: translateY(-2px);
        }

        /* ========== STATS GRID ========== */
        .stats-grid {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--bg-panel);
            border: var(--border-dim);
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-neon);
            box-shadow: 0 0 15px var(--primary-neon);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-neon);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stat-icon {
            font-size: 2.5rem;
            color: var(--primary-neon);
            filter: drop-shadow(0 0 10px var(--primary-neon));
        }

        .stat-info h3 {
            font-size: 2rem;
            font-family: var(--font-head);
            font-weight: 700;
            line-height: 1;
        }

        .stat-info p {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.3rem;
        }

        /* ========== MAIN WORKSPACE ========== */
        .workspace-grid {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ========== PANEL BASE ========== */
        .admin-panel {
            background: var(--bg-panel);
            border: var(--border-dim);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: var(--border-dim);
        }

        .panel-header h2 {
            font-family: var(--font-head);
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header h2 i {
            color: var(--primary-neon);
        }

        .mode-badge {
            background: var(--primary-dim);
            border: 1px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        /* ========== FORM CONTROLS ========== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            background: var(--bg-input);
            border: var(--border-dim);
            border-radius: var(--radius-md);
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px var(--primary-neon);
            background: #000;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        select.form-control {
            cursor: pointer;
        }

        /* ========== ACTION BUTTONS ========== */
        .btn-primary {
            width: 100%;
            background: var(--primary-neon);
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            padding: 1rem;
            font-family: var(--font-head);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: var(--primary-glow);
            transform: translateY(-2px);
        }

        .btn-update {
            background: var(--gold-core);
            color: #000;
            display: none;
        }

        .btn-update:hover {
            background: #FFA500;
            box-shadow: var(--gold-glow);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--danger-core);
            color: var(--danger-core);
            display: none;
        }

        .btn-cancel:hover {
            background: var(--danger-core);
            color: #000;
            box-shadow: var(--danger-glow);
        }

        /* ========== SEARCH & LIST ========== */
        .search-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-wrapper input {
            padding-left: 3rem;
            background: var(--bg-input);
        }

        .list-container {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .list-container::-webkit-scrollbar {
            width: 5px;
        }

        .list-container::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }

        .list-container::-webkit-scrollbar-thumb {
            background: var(--primary-neon);
            border-radius: 5px;
        }

        /* ========== LIST ITEM CARD ========== */
        .list-item {
            background: var(--bg-card);
            border: var(--border-dim);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .list-item:hover {
            border-color: var(--primary-neon);
            transform: translateX(5px);
            background: #151515;
        }

        .list-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: transparent;
            transition: 0.3s;
        }

        .list-item:hover::before {
            background: var(--primary-neon);
            box-shadow: 0 0 15px var(--primary-neon);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .item-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            background: #000;
            border: 1px solid #333;
        }

        .item-details h4 {
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-details span {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge {
            font-size: 0.6rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-free {
            background: var(--primary-dim);
            color: var(--primary-neon);
            border: 1px solid var(--primary-neon);
        }

        .badge-premium {
            background: var(--gold-dim);
            color: var(--gold-core);
            border: 1px solid var(--gold-core);
        }

        .badge-paid {
            background: rgba(255, 145, 0, 0.1);
            color: #ff9100;
            border: 1px solid #ff9100;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn.edit:hover {
            background: var(--primary-dim);
            color: var(--primary-neon);
            border-color: var(--primary-neon);
        }

        .action-btn.delete:hover {
            background: var(--danger-dim);
            color: var(--danger-core);
            border-color: var(--danger-core);
        }

        /* ========== HINT TEXT ========== */
        .hint-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hint-text i {
            color: var(--primary-neon);
        }

        /* ========== ANIMATIONS ========== */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        /* ========== LOADING SKELETON ========== */
        .skeleton-item {
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-md);
            height: 80px;
            margin-bottom: 1rem;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="brand-section">
            <i class="fas fa-bolt brand-icon"></i>
            <div class="brand-text">
                <h1>MVX ADMIN NEXUS</h1>
                <span>SECURE CONTROL PANEL v2.0</span>
            </div>
        </div>
        
        <div class="header-status">

                <div class="status-dot"></div>

            </div>
            <button class="logout-btn" onclick="logoutSystem()">
                <i class="fas fa-power-off"></i> TERMINATE SESSION
            </button>
        </div>
    </header>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-database stat-icon"></i>
            <div class="stat-info">
                <h3 id="totalApps">0</h3>
                <p>Total Files</p>
            </div>
        </div>
        <div class="stat-card">
            <i class="fas fa-crown stat-icon" style="color: var(--gold-core);"></i>
            <div class="stat-info">

                <p>Premium Items</p>
            </div>
        </div>
        <div class="stat-card">

                <p>AES-256</p>
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="workspace-grid">
        <!-- Left Panel: Form -->
        <div class="admin-panel">
            <div class="panel-header">
                <h2><i class="fas fa-terminal"></i> FILE MANAGER</h2>
                <span class="mode-badge" id="modeDisplay">ADD NEW</span>
            </div>

            <input type="hidden" id="editKey">

            <div class="form-group">
                <label>APPLICATION NAME</label>
                <input type="text" id="appName" class="form-control" placeholder="e.g., Free Fire VIP Menu v10">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>VERSION</label>
                    <input type="text" id="appVersion" class="form-control" placeholder="v2.0.0">
                </div>
                <div class="form-group">
                    <label>SIZE (MB)</label>
                    <input type="text" id="appSize" class="form-control" placeholder="45 MB">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>GAME CATEGORY</label>
                    <select id="appCategory" class="form-control">
                        <option value="Free Fire">Free Fire / MAX</option>
                        <option value="PUBG">PUBG Mobile</option>
                        <option value="Blood Strike">Blood Strike</option>
                        <option value="Others">Tools / Injectors</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ACCESS TYPE</label>
                    <select id="accessType" class="form-control" onchange="handleAccessTypeChange()">
                        <option value="Free">Free (Public)</option>
                        <option value="Premium">Premium (Login Required)</option>
                        <option value="Paid">Paid (WhatsApp)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>ICON URL</label>
                <input type="text" id="iconUrl" class="form-control" placeholder="https://i.ibb.co/icon.jpg">
            </div>

            <div class="form-group">
                <label id="linkLabel">DOWNLOAD LINK</label>
                <input type="text" id="downloadLink" class="form-control" placeholder="Paste your download link">
                <div class="hint-text">
                    <i class="fas fa-magic"></i> Auto-converts Google Drive links
                </div>
            </div>

            <div class="form-group">
                <label>FILE PASSWORD (Optional)</label>
                <input type="text" id="filePassword" class="form-control" placeholder="Leave empty if no password">
            </div>

            <button class="btn-primary" id="btnAdd" onclick="addNewFile()">
                <i class="fas fa-cloud-upload-alt"></i> PUBLISH TO NEXUS
            </button>

            <button class="btn-primary btn-update" id="btnUpdate" onclick="updateFile()">
                <i class="fas fa-sync-alt"></i> SAVE CHANGES
            </button>

            <button class="btn-primary btn-cancel" id="btnCancel" onclick="resetForm()">
                <i class="fas fa-times"></i> CANCEL EDIT
            </button>
        </div>

        <!-- Right Panel: List -->
        <div class="admin-panel">
            <div class="panel-header">
                <h2><i class="fas fa-list"></i> LIVE DATABASE</h2>
                <i class="fas fa-sync-alt" style="color: var(--text-muted); cursor: pointer;" onclick="location.reload()"></i>
            </div>

            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Search files by name..." onkeyup="filterList()">
            </div>

                <!-- Dynamic content will be loaded here -->
                <div class="skeleton-item"></div>
                <div class="skeleton-item"></div>
                <div class="skeleton-item"></div>
            </div>
        </div>
    </div>

        };

        // Initialize Firebase

        const database = firebase.database();
        const DB_PATH = "MVX_VIP_SERVER_V5"; // Same as index.html
        const WA_LINK = "https://wa.me/qr/3ZL3GSGN55QIO1"; // WhatsApp link

        // ==================== AUTH CHECK ====================
        (function checkAuth() {
            if (!sessionStorage.getItem('mvx_admin_token')) {
                window.location.href = 'login.html';
            }
        })();

        // ==================== GLOBAL VARIABLES ====================

        // ==================== DOM ELEMENTS ====================
        const listContainer = document.getElementById('listContainer');
        const totalAppsSpan = document.getElementById('totalApps');
        const premiumCountSpan = document.getElementById('premiumCount');

        // ==================== HELPER FUNCTIONS ====================
        function convertGoogleDriveLink(url) {
            if (!url) return url;
            
            // Handle various Google Drive formats
            const patterns = [
                /\/d\/([a-zA-Z0-9_-]+)/,
                /id=([a-zA-Z0-9_-]+)/,
                /\/file\/d\/([a-zA-Z0-9_-]+)/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=download&id=${match[1]}`;
                }
            }
            return url;
        }

        function handleAccessTypeChange() {
            const type = accessType.value;
            const linkLabel = document.getElementById('linkLabel');
            
            if (type === 'Paid') {
                downloadLink.value = WA_LINK;
                linkLabel.innerHTML = 'WHATSAPP CONTACT LINK <span style="color: var(--gold-core);">(Auto-filled)</span>';
            } else {
                if (downloadLink.value === WA_LINK) {
                    downloadLink.value = '';
                }
                linkLabel.innerHTML = 'DOWNLOAD LINK';
            }
        }

        function resetForm() {
            // Clear form
            appName.value = '';
            appVersion.value = '';
            appSize.value = '';
            appCategory.value = 'Free Fire';
            accessType.value = 'Free';
            iconUrl.value = '';
            downloadLink.value = '';
            filePassword.value = '';
            
            // Reset state
            currentEditKey = null;
            editKeyInput.value = '';
            
            // Toggle buttons
            btnAdd.style.display = 'block';
            btnUpdate.style.display = 'none';
            btnCancel.style.display = 'none';
            modeDisplay.textContent = 'ADD NEW';
            modeDisplay.style.color = 'var(--primary-neon)';
            
            handleAccessTypeChange();
        }

        // ==================== CRUD OPERATIONS ====================
        function addNewFile() {
            // Validation
            if (!appName.value || !iconUrl.value || !downloadLink.value) {
                alert('❌ Error: Name, Icon URL, and Download Link are required!');
                return;
            }

            const fileData = {
                appName: appName.value,
                version: appVersion.value || 'v1.0',
                size: appSize.value || 'Unknown',
                gameCategory: appCategory.value,
                accessType: accessType.value,
                iconUrl: iconUrl.value,
                downloadUrl: convertGoogleDriveLink(downloadLink.value),
                password: filePassword.value || '',
                timestamp: Date.now()
            };

            const newKey = database.ref(DB_PATH).push().key;
            
            database.ref(`${DB_PATH}/${newKey}`).set(fileData)
                .then(() => {
                    alert('✅ File published successfully!');
                    resetForm();
                })
                .catch(error => {
                    alert('❌ Error: ' + error.message);
                });
        }

        function prepareEdit(key, fileData) {
            // Populate form
            appName.value = fileData.appName || '';
            appVersion.value = fileData.version || '';
            appSize.value = fileData.size || '';
            appCategory.value = fileData.gameCategory || 'Free Fire';
            accessType.value = fileData.accessType || 'Free';
            iconUrl.value = fileData.iconUrl || '';
            downloadLink.value = fileData.downloadUrl || '';
            filePassword.value = fileData.password || '';
            
            // Set state
            currentEditKey = key;
            editKeyInput.value = key;
            
            // Toggle buttons
            btnAdd.style.display = 'none';
            btnUpdate.style.display = 'block';
            btnCancel.style.display = 'block';
            modeDisplay.textContent = 'EDITING FILE';
            modeDisplay.style.color = 'var(--gold-core)';
            
            // Handle paid state
            handleAccessTypeChange();
            
            // Scroll to form
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateFile() {
            if (!currentEditKey) return;

            const fileData = {
                appName: appName.value,
                version: appVersion.value || 'v1.0',
                size: appSize.value || 'Unknown',
                gameCategory: appCategory.value,
                accessType: accessType.value,
                iconUrl: iconUrl.value,
                downloadUrl: convertGoogleDriveLink(downloadLink.value),
                password: filePassword.value || ''
            };

            database.ref(`${DB_PATH}/${currentEditKey}`).update(fileData)
                .then(() => {
                    alert('✅ File updated successfully!');
                    resetForm();
                })
                .catch(error => {
                    alert('❌ Error: ' + error.message);
                });
        }

        function deleteFile(key) {
            if (confirm('⚠️ WARNING: This will permanently delete the file. Continue?')) {
                database.ref(`${DB_PATH}/${key}`).remove()
                    .then(() => {
                        alert('✅ File deleted');
                    });
            }
        }

        // ==================== REAL-TIME LISTENER ====================
        database.ref(DB_PATH).on('value', (snapshot) => {
            const data = snapshot.val();
            listContainer.innerHTML = '';
            
            if (!data) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>No files in database</p>
                    </div>
                `;
                totalAppsSpan.textContent = '0';
                premiumCountSpan.textContent = '0';
                return;
            }

            // Convert to array
            allFiles = Object.entries(data).map(([key, value]) => ({
                key,
                ...value
            }));

            // Update stats
            totalAppsSpan.textContent = allFiles.length;
            const premiumCount = allFiles.filter(f => f.accessType === 'Premium' || f.accessType === 'Paid').length;
            premiumCountSpan.textContent = premiumCount;

            // Sort by timestamp (newest first)
            allFiles.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            // Render list
            renderList(allFiles);
        });

        function renderList(files) {
            listContainer.innerHTML = '';
            
            files.forEach(file => {
                // Determine badge class
                let badgeClass = 'badge-free';
                if (file.accessType === 'Premium') badgeClass = 'badge-premium';
                if (file.accessType === 'Paid') badgeClass = 'badge-paid';

                const item = document.createElement('div');
                item.className = 'list-item';
                item.innerHTML = `
                    <div class="item-info">
                        <img src="${file.iconUrl || 'https://cdn-icons-png.flaticon.com/512/564/564619.png'}" 
                             class="item-icon" 
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/564/564619.png'">
                        <div class="item-details">
                            <h4>
                                ${file.appName || 'Untitled'}
                                <span class="badge ${badgeClass}">${file.accessType || 'Free'}</span>
                            </h4>
                            <span>${file.gameCategory || 'Other'} • ${file.version || 'v1.0'} • ${file.size || '?'}</span>
                        </div>
                    </div>
                    <div class="item-actions">
                        <div class="action-btn edit" onclick="prepareEdit('${file.key}', ${JSON.stringify(file).replace(/"/g, '&quot;')})">
                            <i class="fas fa-edit"></i>
                        </div>
                        <div class="action-btn delete" onclick="deleteFile('${file.key}')">
                            <i class="fas fa-trash"></i>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // ==================== SEARCH FILTER ====================
        function filterList() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                renderList(allFiles);
                return;
            }

            const filtered = allFiles.filter(file => 
                (file.appName && file.appName.toLowerCase().includes(searchTerm)) ||
                (file.gameCategory && file.gameCategory.toLowerCase().includes(searchTerm))
            );
            
            renderList(filtered);
        }

        // ==================== LOGOUT ====================
        function logoutSystem() {
            if (confirm('Terminate admin session?')) {
                sessionStorage.removeItem('mvx_admin_token');
                window.location.href = 'index.html';
            }
        }

        // ==================== INIT ====================
        // Make functions global
        window.addNewFile = addNewFile;
        window.prepareEdit = prepareEdit;
        window.updateFile = updateFile;
        window.deleteFile = deleteFile;
        window.resetForm = resetForm;
        window.logoutSystem = logoutSystem;
        window.filterList = filterList;
        window.handleAccessTypeChange = handleAccessTypeChange;
    </script>
</body>
</html>
