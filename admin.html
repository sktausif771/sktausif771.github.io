<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <meta name="robots" content="noindex, nofollow">
    <title>MVX ADMIN NEXUS | Secure Control Panel v4.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX ADMIN NEXUS - V4.0 CSS (FULL FEATURES ENABLED)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --danger-dim: rgba(255, 0, 60, 0.15);
            --success: #00ff88; --warning: #ffb800; --gold: #ffd700; --gold-dim: rgba(255, 215, 0, 0.15);
            --bg-void: #000000; --bg-dark: #080b12; --bg-card: #0c101a; --bg-elevated: #111827; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.8); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --font-head: 'Rajdhani', sans-serif; --font-body: 'Space Grotesk', sans-serif; --font-mono: 'Share Tech Mono', monospace;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

        /* Background Effects */
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: -1; }
        
        /* Header */
        .admin-header { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: var(--glass-bg); backdrop-filter: blur(15px); border-bottom: var(--glass-border); z-index: 100; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; }
        .header-left, .header-right { display: flex; align-items: center; gap: 1.5rem; }
        .brand-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .logout-btn { background: var(--danger-dim); border: 1px solid var(--danger); color: var(--danger); padding: 0.6rem 1.5rem; border-radius: 100px; cursor: pointer; font-family: var(--font-head); font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .logout-btn:hover { background: var(--danger); color: #fff; }

        /* Layout */
        .admin-container { max-width: 1600px; margin: 100px auto 2rem; padding: 0 2rem; }
        .workspace-grid { display: grid; grid-template-columns: 1.3fr 1.7fr; gap: 2rem; }
        @media (max-width: 1200px) { .workspace-grid { grid-template-columns: 1fr; } }
        
        .admin-panel { background: var(--glass-bg); backdrop-filter: blur(15px); border: var(--glass-border); border-radius: 16px; padding: 2rem; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: var(--glass-border); padding-bottom: 1rem; }
        .panel-header h2 { font-family: var(--font-head); font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }

        /* Forms */
        .form-group { margin-bottom: 1.2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
        .form-control { width: 100%; background: var(--bg-input); border: var(--glass-border); border-radius: 8px; padding: 0.9rem; color: #fff; font-family: var(--font-body); outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }
        textarea.form-control { resize: vertical; min-height: 100px; }

        /* Dynamic Category Wrapper */
        .dynamic-wrapper { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Image Upload Styling (Base64) */
        .upload-area { border: 2px dashed #333; border-radius: 8px; padding: 1.5rem; text-align: center; background: var(--bg-input); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .upload-area:hover { border-color: var(--primary); background: var(--primary-dim); }
        .upload-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10; }
        .upload-area i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .preview-box { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); }
        .preview-banner { width: 160px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); }

        /* Extra Links Container */
        .extra-link-row { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-bottom: 10px; }

        /* Hide Toggle Switch */
        .toggle-container { display: flex; align-items: center; gap: 15px; background: var(--bg-input); padding: 15px; border-radius: 8px; border: var(--glass-border); margin-bottom: 1.2rem; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Buttons */
        .btn { width: 100%; padding: 1rem; border-radius: 8px; font-family: var(--font-head); font-weight: 700; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }
        .btn-update { background: var(--gold); color: #000; display: none; }
        .btn-cancel { background: transparent; border: 1px solid var(--danger); color: var(--danger); display: none; }

        /* Right Panel List */
        .list-container { max-height: 800px; overflow-y: auto; padding-right: 5px; }
        .list-item { background: var(--bg-card); border: var(--glass-border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .list-item:hover { border-color: var(--primary); transform: translateX(5px); }
        .item-info { display: flex; align-items: center; gap: 1rem; }
        .item-icon { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid #333; }
        .item-details h4 { font-size: 1.1rem; margin-bottom: 0.2rem; display: flex; align-items: center; gap: 0.8rem; }
        .badge { font-size: 0.65rem; padding: 0.3rem 0.8rem; border-radius: 100px; font-weight: bold; text-transform: uppercase; }
        .badge.Free { background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary); }
        .badge.Premium { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold); }
        .badge.Paid { background: var(--danger-dim); color: var(--danger); border: 1px solid var(--danger); }
        .badge.hidden { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555; }
        
        .action-btn { width: 35px; height: 35px; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--glass-border); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; margin-left: 5px; }
        .action-btn.edit:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
        .action-btn.delete:hover { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }
        .item-actions { display: flex; }

        /* Toast */
        .toast-container { position: fixed; top: 90px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-elevated); border-left: 4px solid var(--primary); padding: 1rem 1.5rem; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; gap: 10px; align-items: center; animation: slideIn 0.3s; font-family: var(--font-body); font-weight: 500; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="toast-container" id="toastContainer"></div>

    <header class="admin-header">
        <div class="header-left">
            <span class="brand-text">MVX ADMIN NEXUS</span>
        </div>
        <div class="header-right">
            <button class="logout-btn" onclick="logoutSystem()">
                <i class="fas fa-power-off"></i> TERMINATE
            </button>
        </div>
    </header>

    <div class="admin-container">
        <div class="workspace-grid">
            
            <div class="admin-panel">
                <div class="panel-header">
                    <h2 id="modeDisplay"><i class="fas fa-terminal"></i> UPLOAD NEW APP</h2>
                </div>

                <input type="hidden" id="editKey">

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> APP NAME</label>
                    <input type="text" id="appName" class="form-control" placeholder="e.g., Free Fire VIP Menu">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-code-branch"></i> VERSION</label>
                        <input type="text" id="appVersion" class="form-control" placeholder="v1.0">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-weight-hanging"></i> SIZE (MB)</label>
                        <input type="text" id="appSize" class="form-control" placeholder="45 MB">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> ACCESS TYPE</label>
                    <select id="accessType" class="form-control" onchange="handleAccessChange()">
                        <option value="">-- Select Type --</option>
                        <option value="Free">Free (Public)</option>
                        <option value="Premium">Premium (Login)</option>
                        <option value="Paid">Paid (VIP)</option>
                    </select>
                </div>

                <div class="form-group dynamic-wrapper" id="categoryWrapper">
                    <label><i class="fas fa-gamepad"></i> GAME CATEGORY</label>
                    <select id="appCategory" class="form-control">
                        <option value="Free Fire">Free Fire</option>
                        <option value="PUBG">PUBG Mobile</option>
                        <option value="Blood Strike">Blood Strike</option>
                        <option value="Tools">Tools / Injectors</option>
                        <option value="Other Game">Other Game</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> APP LOGO</label>
                        <div class="upload-area">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p style="font-size: 0.8rem; color: var(--text-muted)">Select Logo</p>
                            <input type="file" accept="image/*" onchange="convertImage(this, 'logoPreview', 'logo')">
                        </div>
                        <div class="preview-box" id="logoPreview"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tv"></i> YOUTUBE BANNER</label>
                        <div class="upload-area">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p style="font-size: 0.8rem; color: var(--text-muted)">Select Banner</p>
                            <input type="file" accept="image/*" onchange="convertImage(this, 'bannerPreview', 'banner')">
                        </div>
                        <div class="preview-box" id="bannerPreview"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-mobile-alt"></i> PREVIEW SCREENSHOTS (MAX 5)</label>
                    <div class="upload-area" style="padding: 1rem;">
                        <i class="fas fa-images"></i>
                        <p style="font-size: 0.8rem; color: var(--text-muted)">Select up to 5 images</p>
                        <input type="file" accept="image/*" multiple onchange="convertMultipleImages(this)">
                    </div>
                    <div class="preview-box" id="screenshotsPreview"></div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-link"></i> DOWNLOAD LINK</label>
                    <input type="url" id="downloadLink" class="form-control" placeholder="Direct Download URL">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> FILE PASSWORD</label>
                        <input type="text" id="filePassword" class="form-control" placeholder="Leave empty if none">
                    </div>
                    <div class="form-group">
                        <label><i class="fab fa-youtube"></i> PASSWORD VIDEO LINK</label>
                        <input type="url" id="videoLink" class="form-control" placeholder="YouTube Video URL">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-share-alt"></i> EXTRA SOCIAL LINKS</label>
                    <div id="extraLinksContainer">
                        <div class="extra-link-row">
                            <input type="text" class="form-control link-title" placeholder="Title (e.g. Telegram)">
                            <input type="url" class="form-control link-url" placeholder="URL Link">
                        </div>
                        <div class="extra-link-row">
                            <input type="text" class="form-control link-title" placeholder="Title (e.g. YouTube)">
                            <input type="url" class="form-control link-url" placeholder="URL Link">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> APP DESCRIPTION</label>
                    <textarea id="appDescription" class="form-control" placeholder="Write app features, details..."></textarea>
                </div>

                <div class="toggle-container">
                    <label style="margin: 0; font-size: 0.9rem;"><i class="fas fa-eye-slash"></i> HIDE APP FROM USERS?</label>
                    <label class="switch">
                        <input type="checkbox" id="isHidden">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn btn-primary" id="btnAdd" onclick="saveData()"><i class="fas fa-save"></i> PUBLISH TO NEXUS</button>
                <button class="btn btn-update" id="btnUpdate" onclick="saveData()"><i class="fas fa-sync"></i> SAVE CHANGES</button>
                <button class="btn btn-cancel" id="btnCancel" onclick="resetForm()"><i class="fas fa-times"></i> CANCEL</button>
            </div>

            <div class="admin-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-database"></i> LIVE DATABASE</h2>
                    <input type="text" id="searchInput" class="form-control" style="width: 250px; padding: 0.6rem;" placeholder="Search App Name..." onkeyup="filterList()">
                </div>
                <div class="list-container" id="listContainer">
                    <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Loading Secure Data...</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ==========================================================================
        // FIREBASE CONFIGURATION (MVX_VIP_SERVER_V5)
        // ==========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const DB_PATH = "MVX_VIP_SERVER_V5";

        // Security Check
        if (!sessionStorage.getItem('mvx_admin_token')) {
            window.location.href = 'login.html';
        }

        // Global State Variables
        let allApps = [];
        let base64Logo = "";
        let base64Banner = "";
        let base64Screenshots = [];

        // UI Helpers
        function showToast(msg, type='success') {
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--success)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--success)'}"></i> <span>${msg}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function handleAccessChange() {
            const accessType = document.getElementById('accessType').value;
            const wrapper = document.getElementById('categoryWrapper');
            if(accessType) { wrapper.style.display = 'block'; } else { wrapper.style.display = 'none'; }
        }

        // Base64 Converters
        function convertImage(input, previewId, type) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const b64 = e.target.result;
                const cssClass = type === 'banner' ? 'preview-banner' : 'preview-img';
                document.getElementById(previewId).innerHTML = `<img src="${b64}" class="${cssClass}">`;
                if(type === 'logo') base64Logo = b64;
                if(type === 'banner') base64Banner = b64;
            };
            reader.readAsDataURL(file);
        }

        function convertMultipleImages(input) {
            const files = input.files;
            if(files.length > 5) { showToast("Max 5 screenshots allowed!", "error"); return; }
            base64Screenshots = [];
            document.getElementById('screenshotsPreview').innerHTML = '';
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Screenshots.push(e.target.result);
                    document.getElementById('screenshotsPreview').innerHTML += `<img src="${e.target.result}" class="preview-img">`;
                };
                reader.readAsDataURL(file);
            });
        }

        // Extract Extra Links
        function getExtraLinks() {
            let links = [];
            document.querySelectorAll('.extra-link-row').forEach(row => {
                const title = row.querySelector('.link-title').value;
                const url = row.querySelector('.link-url').value;
                if(title && url) links.push({ title, url });
            });
            return links;
        }

        function setExtraLinks(links) {
            const rows = document.querySelectorAll('.extra-link-row');
            if(links && links[0]) { rows[0].querySelector('.link-title').value = links[0].title; rows[0].querySelector('.link-url').value = links[0].url; }
            if(links && links[1]) { rows[1].querySelector('.link-title').value = links[1].title; rows[1].querySelector('.link-url').value = links[1].url; }
        }

        // SAVE OR UPDATE LOGIC
        async function saveData() {
            const appName = document.getElementById('appName').value;
            const access = document.getElementById('accessType').value;
            const dLink = document.getElementById('downloadLink').value;
            
            if(!appName || !access || !dLink) { showToast("Name, Access Type & Download Link required!", "error"); return; }

            const editKey = document.getElementById('editKey').value;
            let finalLogo = base64Logo;
            let finalBanner = base64Banner;
            let finalScreenshots = base64Screenshots;

            // Retain old images if updating without new files
            if(editKey) {
                const oldData = allApps.find(a => a.key === editKey);
                if(!finalLogo) finalLogo = oldData.logoBase64 || "";
                if(!finalBanner) finalBanner = oldData.bannerBase64 || "";
                if(finalScreenshots.length === 0) finalScreenshots = oldData.screenshots || [];
            }

            const appData = {
                appName: appName,
                version: document.getElementById('appVersion').value || 'v1.0',
                size: document.getElementById('appSize').value || 'N/A',
                accessType: access,
                gameCategory: document.getElementById('appCategory').value,
                logoBase64: finalLogo,
                bannerBase64: finalBanner,
                screenshots: finalScreenshots,
                downloadUrl: dLink,
                password: document.getElementById('filePassword').value,
                passwordVideoUrl: document.getElementById('videoLink').value,
                description: document.getElementById('appDescription').value,
                extraLinks: getExtraLinks(),
                isHidden: document.getElementById('isHidden').checked,
                timestamp: Date.now()
            };

            try {
                if(editKey) {
                    await database.ref(`${DB_PATH}/${editKey}`).update(appData);
                    showToast("App Updated Successfully!");
                } else {
                    await database.ref(DB_PATH).push(appData);
                    showToast("App Published to Nexus!");
                }
                resetForm();
            } catch (error) { showToast(error.message, "error"); }
        }

        // LOAD DATA
        database.ref(DB_PATH).on('value', (snap) => {
            const data = snap.val();
            const list = document.getElementById('listContainer');
            allApps = [];
            if(!data) { list.innerHTML = '<p style="text-align:center; color:gray; margin-top:20px;">No Apps Found</p>'; return; }
            allApps = Object.entries(data).map(([key, val]) => ({key, ...val})).reverse();
            renderList(allApps);
        });

        function renderList(apps) {
            const list = document.getElementById('listContainer');
            list.innerHTML = '';
            apps.forEach(app => {
                const isHidden = app.isHidden ? '<span class="badge hidden"><i class="fas fa-eye-slash"></i> Hidden</span>' : '';
                const logoSrc = app.logoBase64 || 'https://cdn-icons-png.flaticon.com/512/564/564619.png';
                list.innerHTML += `
                    <div class="list-item" style="${app.isHidden ? 'opacity:0.5;' : ''}">
                        <div class="item-info">
                            <img src="${logoSrc}" class="item-icon">
                            <div class="item-details">
                                <h4>${app.appName} <span class="badge ${app.accessType}">${app.accessType}</span> ${isHidden}</h4>
                                <span>${app.gameCategory} • ${app.version}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <div class="action-btn edit" onclick='editApp("${app.key}")'><i class="fas fa-edit"></i></div>
                            <div class="action-btn delete" onclick='deleteApp("${app.key}")'><i class="fas fa-trash"></i></div>
                        </div>
                    </div>
                `;
            });
        }

        // EDIT, DELETE, RESET
        function editApp(key) {
            const app = allApps.find(a => a.key === key);
            if(!app) return;

            document.getElementById('editKey').value = key;
            document.getElementById('appName').value = app.appName;
            document.getElementById('appVersion').value = app.version || '';
            document.getElementById('appSize').value = app.size || '';
            
            document.getElementById('accessType').value = app.accessType;
            handleAccessChange();
            setTimeout(() => { document.getElementById('appCategory').value = app.gameCategory; }, 50);

            document.getElementById('downloadLink').value = app.downloadUrl || '';
            document.getElementById('filePassword').value = app.password || '';
            document.getElementById('videoLink').value = app.passwordVideoUrl || '';
            document.getElementById('appDescription').value = app.description || '';
            document.getElementById('isHidden').checked = app.isHidden || false;
            setExtraLinks(app.extraLinks);

            // Previews
            base64Logo = ""; base64Banner = ""; base64Screenshots = [];
            document.getElementById('logoPreview').innerHTML = app.logoBase64 ? `<img src="${app.logoBase64}" class="preview-img">` : '';
            document.getElementById('bannerPreview').innerHTML = app.bannerBase64 ? `<img src="${app.bannerBase64}" class="preview-banner">` : '';
            document.getElementById('screenshotsPreview').innerHTML = '';
            if(app.screenshots) { app.screenshots.forEach(img => { document.getElementById('screenshotsPreview').innerHTML += `<img src="${img}" class="preview-img">`; }); }

            document.getElementById('modeDisplay').innerHTML = '<i class="fas fa-edit"></i> EDITING APP';
            document.getElementById('modeDisplay').style.color = 'var(--gold)';
            document.getElementById('btnAdd').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'flex';
            document.getElementById('btnCancel').style.display = 'flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteApp(key) {
            if(confirm("Are you sure you want to delete this app permanently?")) {
                database.ref(`${DB_PATH}/${key}`).remove();
                showToast("App Deleted Successfully");
            }
        }

        function resetForm() {
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if(el.type === 'checkbox') el.checked = false; else el.value = '';
            });
            document.getElementById('logoPreview').innerHTML = ''; document.getElementById('bannerPreview').innerHTML = ''; document.getElementById('screenshotsPreview').innerHTML = '';
            base64Logo = ""; base64Banner = ""; base64Screenshots = [];
            
            document.getElementById('categoryWrapper').style.display = 'none';
            document.getElementById('modeDisplay').innerHTML = '<i class="fas fa-terminal"></i> UPLOAD NEW APP';
            document.getElementById('modeDisplay').style.color = '';
            document.getElementById('btnAdd').style.display = 'flex';
            document.getElementById('btnUpdate').style.display = 'none';
            document.getElementById('btnCancel').style.display = 'none';
        }

        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allApps.filter(a => a.appName.toLowerCase().includes(term));
            renderList(filtered);
        }

        function logoutSystem() {
            sessionStorage.removeItem('mvx_admin_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
