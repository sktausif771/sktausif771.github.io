<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>MVX SECURE LOGIN | Admin Portal v4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX ADMIN LOGIN PAGE V4.0 (OPTIMIZED & BUG-FREE)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --bg-void: #000000; --bg-card: rgba(8, 11, 18, 0.85); 
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --font-head: 'Orbitron', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { 
            background: var(--bg-void); 
            color: var(--text-primary); 
            font-family: var(--font-body); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        /* Smooth Background Effects (No Lag) */
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.04) 1px, transparent 1px); background-size: 50px 50px; z-index: 1; pointer-events: none; }
        .glow-orb { position: absolute; width: 50vmax; height: 50vmax; background: radial-gradient(circle, rgba(0, 230, 184, 0.1) 0%, transparent 70%); border-radius: 50%; filter: blur(50px); z-index: 1; pointer-events: none; }

        /* Login Card */
        .login-box { 
            background: var(--bg-card); 
            border: 1px solid rgba(0, 230, 184, 0.3); 
            padding: 40px 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 0 40px rgba(0, 230, 184, 0.1); 
            backdrop-filter: blur(15px); 
            z-index: 10;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo { font-family: var(--font-head); font-size: 2rem; font-weight: 700; color: var(--primary); margin-bottom: 5px; letter-spacing: 1px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 35px; letter-spacing: 2px; }
        
        /* Input Field */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.2rem; }
        
        .pass-input { 
            width: 100%; 
            background: rgba(26, 31, 44, 0.8); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 16px 16px 16px 50px; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            outline: none; 
            transition: 0.3s; 
            letter-spacing: 5px; 
            text-align: center;
            font-family: 'Share Tech Mono', monospace; 
        }
        .pass-input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }

        /* Button */
        .btn-login { 
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 1.3rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            letter-spacing: 1px;
        }
        .btn-login:hover { box-shadow: 0 0 25px var(--primary-dim); transform: translateY(-3px); }

        /* Toast Message */
        .toast { 
            position: fixed; top: 30px; right: 20px; 
            background: #1a1f2c; border-left: 4px solid var(--primary); 
            color: #fff; padding: 15px 20px; border-radius: 8px; 
            z-index: 1000; display: none; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
            font-weight: 600; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="glow-orb"></div>
    
    <div class="toast" id="toastBox"><i class="fas fa-info-circle"></i> <span id="toastMsg">Message</span></div>

    <div class="login-box">
        <div class="brand-logo"><i class="fas fa-shield-alt"></i> SYSTEM LOGIN</div>
        <p class="subtitle">STORE ADMIN PORTAL</p>
        
        <div class="input-group">
            <i class="fas fa-key input-icon"></i>
            <input type="password" id="adminPass" class="pass-input" placeholder="••••••" autocomplete="off">
        </div>
        
        <button class="btn-login" onclick="verifyLogin()">
            <i class="fas fa-fingerprint"></i> AUTHORIZE ACCESS
        </button>
        
        <p style="margin-top: 25px; font-size: 0.8rem; color: #555;"><i class="fas fa-lock"></i> 256-Bit Encrypted Connection</p>
    </div>

    <script>
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastBox');
            const toastMsg = document.getElementById('toastMsg');
            
            toastMsg.innerText = msg;
            toast.style.display = 'block';
            toast.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--primary)';
            
            // Auto hide after 3 seconds
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function verifyLogin() {
            const pass = document.getElementById('adminPass').value;
            const btn = document.querySelector('.btn-login');
            
            if(!pass) {
                showToast('Please enter the access password!', true);
                return;
            }
            
            // Button loading animation
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> VERIFYING...';
            btn.style.opacity = '0.8';
            
            // Simulate processing time
            setTimeout(() => {
                if(pass === "121345") {
                    showToast('ACCESS GRANTED! Redirecting...');
                    
                    // Generate Secure Session Token
                    sessionStorage.setItem('mvx_admin_token', 'SECURE_AUTHORIZED');
                    
                    // Redirect to Admin Dashboard
                    setTimeout(() => {
                        window.location.href = 'store-dashboard.html';
                    }, 1000);
                } else {
                    showToast('ACCESS DENIED: Incorrect Password', true);
                    document.getElementById('adminPass').value = '';
                    btn.innerHTML = '<i class="fas fa-fingerprint"></i> AUTHORIZE ACCESS';
                    btn.style.opacity = '1';
                }
            }, 800);
        }

        // Allow pressing 'Enter' key to login
        document.getElementById('adminPass').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                verifyLogin();
            }
        });
    </script>
</body>
</html>
