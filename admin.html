<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MVX COMMAND CENTER</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           ADMIN PANEL STYLES (NEON THEME)
           ========================================= */
        :root {
            --primary: #00e676;
            --secondary: #2979ff;
            --gold: #FFD700;
            --bg-dark: #050505;
            --card-bg: #111;
            --text-main: #fff;
            --danger: #ff1744;
            --input-bg: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- HEADER SECTION --- */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .admin-branding {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-branding h2 {
            font-family: 'Rajdhani', sans-serif;
            color: var(--primary);
            font-size: 24px;
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 10px;
            background: rgba(0, 230, 118, 0.1);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 5px;
            border: 1px solid var(--primary);
        }

        .btn-logout {
            background: rgba(255, 23, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-logout:hover { background: var(--danger); color: white; }

        /* --- UPLOAD CONTAINER --- */
        .upload-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media(min-width: 768px) {
            .upload-container { grid-template-columns: 3fr 2fr; }
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid #222;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        h3 { margin-bottom: 20px; border-left: 4px solid var(--primary); padding-left: 15px; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #aaa; font-weight: 500; }
        
        input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #333;
            padding: 14px;
            color: white;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 230, 118, 0.1); }

        .row { display: flex; gap: 15px; }

        /* --- UPLOAD TYPE TOGGLE --- */
        .upload-type-switch {
            display: flex;
            background: #000;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .switch-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            transition: 0.3s;
        }
        .switch-btn.active {
            background: var(--primary);
            color: black;
            font-weight: bold;
        }

        /* --- FILE UPLOAD BOX --- */
        .file-drop-zone {
            border: 2px dashed #444;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .file-drop-zone:hover { border-color: var(--primary); background: rgba(0, 230, 118, 0.05); }
        
        .file-icon { font-size: 40px; color: #555; margin-bottom: 10px; }
        .file-name-display { font-size: 12px; color: var(--primary); margin-top: 10px; word-break: break-all; }

        /* --- PROGRESS BAR --- */
        .progress-wrapper {
            margin-top: 20px;
            background: #222;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            display: none; /* Hidden initially */
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.2s;
        }
        .progress-text { font-size: 11px; text-align: center; margin-top: 5px; color: #aaa; }

        /* --- SUBMIT BUTTON --- */
        .btn-publish {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: black;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-publish:hover { background: #00c853; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }

        /* --- MANAGE LIST --- */
        .app-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #151515;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #222;
        }
        .app-info-left { display: flex; align-items: center; gap: 15px; }
        .app-thumb { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 5px; }
        .badge-free { background: #222; color: #aaa; border: 1px solid #444; }
        .badge-premium { background: rgba(0, 230, 118, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .badge-paid { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }

        /* Hidden Inputs */
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="admin-branding">
            <i class="fas fa-shield-alt" style="font-size: 30px; color: var(--primary);"></i>
            <div>
                <h2>Admin Console</h2>
                <span class="status-badge">SECURE CONNECTION V5.5</span>
            </div>
        </div>
        <button class="btn-logout" onclick="logout()">
            <i class="fas fa-power-off"></i> LOGOUT
        </button>
    </div>

    <div class="upload-container">
        
        <div class="card">
            <h3><i class="fas fa-cloud-upload-alt"></i> Upload New App</h3>

            <div class="form-group">
                <label>Application Name</label>
                <input type="text" id="appName" placeholder="Ex: Free Fire Max Mod Menu v5">
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label>Version</label>
                    <input type="text" id="appVersion" placeholder="v1.0">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Size</label>
                    <input type="text" id="appSize" placeholder="50 MB">
                </div>
            </div>

            <div class="row">
                <div class="form-group" style="flex: 1;">
                    <label>Game Category</label>
                    <select id="gameCategory">
                        <option value="Free Fire">Free Fire</option>
                        <option value="PUBG">PUBG Mobile</option>
                        <option value="Blood Strike">Blood Strike</option>
                        <option value="Others">Others / Tools</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Access Type</label>
                    <select id="accessType" onchange="togglePaidOptions()">
                        <option value="Free">Free (Direct)</option>
                        <option value="Premium">Premium (Login Req)</option>
                        <option value="Paid">Paid (Buy Now)</option>
                    </select>
                </div>
            </div>

            <label>Upload Method</label>
            <div class="upload-type-switch">
                <div class="switch-btn active" id="btnLink" onclick="switchMethod('link')">External Link</div>
                <div class="switch-btn" id="btnFile" onclick="switchMethod('file')">Upload File</div>
            </div>

            <div id="linkInputSection" class="form-group">
                <label id="urlLabel">Download Link (Mediafire/Drive)</label>
                <input type="text" id="downloadUrl" placeholder="Paste your link here...">
                <p style="font-size: 10px; color: #666; margin-top: 5px;">*For Paid Apps, this will auto-set to your WhatsApp.</p>
            </div>

            <div id="fileInputSection" class="form-group" style="display: none;">
                <label>Select APK/ZIP File</label>
                <div class="file-drop-zone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-file-import file-icon"></i>
                    <p>Click to Browse Gallery/Files</p>
                    <div id="fileNameDisplay" class="file-name-display"></div>
                </div>
                <input type="file" id="fileInput" accept=".apk, .zip, .rar">
                
                <div class="progress-wrapper" id="progressWrapper">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText"></div>
            </div>

            <div class="form-group">
                <label>Icon Image URL</label>
                <input type="text" id="iconUrl" placeholder="Direct Image Link">
            </div>

            <div class="form-group" id="passGroup">
                <label>Password (Optional)</label>
                <input type="text" id="appPass" placeholder="Leave empty if none">
            </div>

            <button class="btn-publish" onclick="startUploadProcess()">PUBLISH CONTENT</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-tasks"></i> Manage Content</h3>
            <div id="manageList" style="max-height: 600px; overflow-y: auto; padding-right: 5px;">
                <p style="text-align:center; color:#555;">Connecting to Database...</p>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        // SERVER PATH (Do not change)
        const SERVER_PATH = "MVX_VIP_SERVER_V5"; 
        const WA_LINK = "https://wa.me/qr/3ZL3GSGN55QIO1";

        // --- 2. AUTH CHECK ---
        if (!sessionStorage.getItem("mvx_admin_token")) {
            window.location.href = "login.html";
        }
        function logout() {
            sessionStorage.removeItem("mvx_admin_token");
            window.location.href = "index.html";
        }

        // --- 3. UI LOGIC (SWITCHES) ---
        let currentMethod = 'link';

        function switchMethod(method) {
            currentMethod = method;
            const btnLink = document.getElementById('btnLink');
            const btnFile = document.getElementById('btnFile');
            const linkSec = document.getElementById('linkInputSection');
            const fileSec = document.getElementById('fileInputSection');

            if(method === 'link') {
                btnLink.classList.add('active');
                btnFile.classList.remove('active');
                linkSec.style.display = 'block';
                fileSec.style.display = 'none';
            } else {
                btnFile.classList.add('active');
                btnLink.classList.remove('active');
                linkSec.style.display = 'none';
                fileSec.style.display = 'block';
            }
        }

        // File Selection Display
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : "No file selected";
            document.getElementById('fileNameDisplay').innerText = fileName;
        });

        // Toggle Paid Logic
        function togglePaidOptions() {
            const type = document.getElementById('accessType').value;
            const urlInput = document.getElementById('downloadUrl');
            const urlLabel = document.getElementById('urlLabel');

            if(type === 'Paid') {
                urlInput.value = WA_LINK;
                urlInput.disabled = false; // Admin can still edit if needed
                urlLabel.innerText = "Redirect Link (Auto-set to WhatsApp)";
                // Force Link Method
                switchMethod('link'); 
            } else {
                if(urlInput.value === WA_LINK) urlInput.value = "";
                urlInput.disabled = false;
                urlLabel.innerText = "Download Link (Mediafire/Drive)";
            }
        }

        // --- 4. UPLOAD LOGIC ---
        function startUploadProcess() {
            const name = document.getElementById('appName').value;
            const version = document.getElementById('appVersion').value;
            const size = document.getElementById('appSize').value;
            const category = document.getElementById('gameCategory').value; // Specific Game
            const type = document.getElementById('accessType').value; // Free/Premium/Paid
            const icon = document.getElementById('iconUrl').value;
            const pass = document.getElementById('appPass').value;

            if(!name || !icon) {
                alert("Please fill all required fields (Name, Icon)");
                return;
            }

            // A. IF FILE UPLOAD
            if(currentMethod === 'file') {
                const file = document.getElementById('fileInput').files[0];
                if(!file) { alert("Please select a file!"); return; }

                const storageRef = storage.ref(`apks/${Date.now()}_${file.name}`);
                const uploadTask = storageRef.put(file);

                // Progress Bar Logic
                document.getElementById('progressWrapper').style.display = 'block';
                
                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        document.getElementById('progressBar').style.width = progress + '%';
                        document.getElementById('progressText').innerText = `Uploading: ${Math.floor(progress)}%`;
                    }, 
                    (error) => { alert("Upload Failed: " + error.message); }, 
                    () => {
                        uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                            saveToDatabase(name, version, size, category, type, icon, downloadURL, pass);
                        });
                    }
                );
            } 
            // B. IF LINK
            else {
                const link = document.getElementById('downloadUrl').value;
                if(!link) { alert("Please enter a link!"); return; }
                saveToDatabase(name, version, size, category, type, icon, link, pass);
            }
        }

        function saveToDatabase(name, ver, size, cat, type, icon, link, pass) {
            const newKey = db.ref(SERVER_PATH).push().key;
            const appData = {
                appName: name,
                version: ver,
                size: size,
                gameCategory: cat, // e.g. Free Fire
                accessType: type,  // e.g. Paid
                iconUrl: icon,
                downloadUrl: link,
                password: pass,
                timestamp: Date.now()
            };

            db.ref(SERVER_PATH + '/' + newKey).set(appData).then(() => {
                alert("✅ Upload Successful!");
                location.reload();
            });
        }

        // --- 5. MANAGE LIST ---
        const listContainer = document.getElementById('manageList');
        db.ref(SERVER_PATH).on('value', (snapshot) => {
            const data = snapshot.val();
            listContainer.innerHTML = '';
            if(data) {
                Object.keys(data).reverse().forEach(key => {
                    const app = data[key];
                    let badgeClass = 'badge-free';
                    if(app.accessType === 'Premium') badgeClass = 'badge-premium';
                    if(app.accessType === 'Paid') badgeClass = 'badge-paid';

                    const item = `
                        <div class="app-item">
                            <div class="app-info-left">
                                <img src="${app.iconUrl}" class="app-thumb" onerror="this.src='https://via.placeholder.com/40'">
                                <div>
                                    <div style="font-weight:bold; font-size:13px; color:white;">
                                        ${app.appName}
                                        <span class="badge ${badgeClass}">${app.accessType}</span>
                                    </div>
                                    <div style="font-size:11px; color:#888;">
                                        ${app.gameCategory} • ${app.version}
                                    </div>
                                </div>
                            </div>
                            <i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="deleteApp('${key}')"></i>
                        </div>
                    `;
                    listContainer.innerHTML += item;
                });
            } else {
                listContainer.innerHTML = '<p style="text-align:center; padding:20px; color:#555;">No apps found.</p>';
            }
        });

        window.deleteApp = function(key) {
            if(confirm("Delete this app?")) {
                db.ref(SERVER_PATH + '/' + key).remove();
            }
        }

    </script>
</body>
</html>
