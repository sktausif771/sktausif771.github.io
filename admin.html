<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <meta name="robots" content="noindex, nofollow">
    <title>MVX ADMIN NEXUS | Secure Control Panel v4.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX ADMIN NEXUS - V4.0 CSS 
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --primary-hue: 168; --primary-saturation: 100%; --primary-lightness: 45%;
            --primary: hsl(var(--primary-hue), var(--primary-saturation), var(--primary-lightness));
            --primary-dark: hsl(var(--primary-hue), var(--primary-saturation), 35%);
            --primary-dim: hsla(var(--primary-hue), var(--primary-saturation), var(--primary-lightness), 0.15);
            --danger: #ff003c; --danger-dim: rgba(255, 0, 60, 0.1);
            --success: #00ff88; --warning: #ffb800; --gold: #ffd700; --gold-dim: rgba(255, 215, 0, 0.1);
            
            --bg-void: #000000; --bg-deep: #03050a; --bg-dark: #080b12; 
            --bg-card: #0c101a; --bg-elevated: #111827; --bg-input: #1a1f2c;
            
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.7); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --glass-blur: blur(20px);
            --font-head: 'Rajdhani', sans-serif; --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

        /* Background Effects */
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: -1; }
        
        /* Header */
        .admin-header { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-bottom: var(--glass-border); z-index: 100; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; }
        .header-left, .header-right { display: flex; align-items: center; gap: 1.5rem; }
        .brand-text { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .logout-btn { background: var(--danger-dim); border: 1px solid var(--danger); color: var(--danger); padding: 0.6rem 1.5rem; border-radius: 100px; cursor: pointer; font-family: var(--font-head); font-weight: 600; transition: 0.3s; }
        .logout-btn:hover { background: var(--danger); color: #fff; }

        /* Layout */
        .admin-container { max-width: 1600px; margin: 100px auto 2rem; padding: 0 2rem; }
        .workspace-grid { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 2rem; }
        @media (max-width: 1200px) { .workspace-grid { grid-template-columns: 1fr; } }
        
        .admin-panel { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: var(--glass-border); border-radius: 16px; padding: 2rem; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: var(--glass-border); padding-bottom: 1rem; }
        .panel-header h2 { font-family: var(--font-head); font-size: 1.5rem; }

        /* Forms */
        .form-group { margin-bottom: 1.2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; font-family: var(--font-mono); text-transform: uppercase; }
        .form-control { width: 100%; background: var(--bg-input); border: var(--glass-border); border-radius: 8px; padding: 0.9rem; color: #fff; font-family: var(--font-body); outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        /* Dynamic Hide/Show Wrapper */
        .dynamic-wrapper { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* File Upload Styling */
        .file-upload-box { border: 2px dashed var(--primary-dim); border-radius: 8px; padding: 1rem; text-align: center; background: var(--bg-input); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .file-upload-box:hover { border-color: var(--primary); background: var(--primary-dim); }
        .file-upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-upload-box i { font-size: 2rem; color: var(--primary); margin-bottom: 0.5rem; }
        .preview-area { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); }

        /* Extra Links Container */
        .extra-link-row { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-bottom: 10px; }
        
        /* Toggle Switch */
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg-input); transition: .4s; border-radius: 24px; border: var(--glass-border); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: var(--text-muted); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-dim); border-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); background-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* Buttons */
        .btn { width: 100%; padding: 1rem; border-radius: 8px; font-family: var(--font-head); font-weight: 700; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }
        .btn-update { background: var(--gold); color: #000; display: none; }
        .btn-cancel { background: transparent; border: 1px solid var(--danger); color: var(--danger); display: none; }

        /* List & Items */
        .list-container { max-height: 800px; overflow-y: auto; padding-right: 5px; }
        .list-item { background: var(--bg-card); border: var(--glass-border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .list-item:hover { border-color: var(--primary); transform: translateX(5px); }
        .item-info { display: flex; align-items: center; gap: 1rem; }
        .item-icon { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }
        .item-details h4 { font-size: 1rem; margin-bottom: 0.2rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 100px; background: var(--primary-dim); color: var(--primary); border: 1px solid var(--primary); }
        .badge.hidden { background: rgba(255,255,255,0.1); color: #fff; border-color: #555; }
        .action-btn { width: 35px; height: 35px; border-radius: 8px; background: var(--bg-dark); border: 1px solid var(--glass-border); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; margin-left: 5px; }
        .action-btn.edit:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
        .action-btn.delete:hover { background: var(--danger-dim); color: var(--danger); border-color: var(--danger); }
        .item-actions { display: flex; }

        /* Toast */
        .toast-container { position: fixed; top: 90px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-elevated); border-left: 4px solid var(--primary); padding: 1rem; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; gap: 10px; align-items: center; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="toast-container" id="toastContainer"></div>

    <header class="admin-header">
        <div class="header-left">
            <span class="brand-text">MVX NEXUS ADMIN</span>
        </div>
        <div class="header-right">
            <button class="logout-btn" onclick="logoutSystem()">
                <i class="fas fa-power-off"></i> LOGOUT
            </button>
        </div>
    </header>

    <div class="admin-container">
        <div class="workspace-grid">
            
            <div class="admin-panel">
                <div class="panel-header">
                    <h2 id="modeDisplay"><i class="fas fa-cloud-upload-alt"></i> UPLOAD NEW APP</h2>
                </div>

                <input type="hidden" id="editKey">

                <div class="form-group">
                    <label>APP NAME</label>
                    <input type="text" id="appName" class="form-control" placeholder="e.g., Free Fire VIP Hack">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>VERSION</label>
                        <input type="text" id="appVersion" class="form-control" placeholder="v2.0">
                    </div>
                    <div class="form-group">
                        <label>SIZE (MB)</label>
                        <input type="text" id="appSize" class="form-control" placeholder="45 MB">
                    </div>
                </div>

                <div class="form-group">
                    <label>ACCESS TYPE</label>
                    <select id="accessType" class="form-control" onchange="handleAccessChange()">
                        <option value="">-- Select Access Type --</option>
                        <option value="Free">Free (Public)</option>
                        <option value="Premium">Premium (Login Required)</option>
                        <option value="Paid">Paid (VIP)</option>
                    </select>
                </div>

                <div class="form-group dynamic-wrapper" id="categoryWrapper">
                    <label>GAME / CATEGORY</label>
                    <select id="appCategory" class="form-control">
                        <option value="Free Fire">Free Fire / MAX</option>
                        <option value="PUBG">PUBG Mobile</option>
                        <option value="Blood Strike">Blood Strike</option>
                        <option value="Other Game">Other Game</option>
                        <option value="Tools">Tools / Injectors</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>APP LOGO</label>
                        <div class="file-upload-box">
                            <i class="fas fa-image"></i>
                            <p style="font-size: 0.8rem; color: var(--text-muted)">Click to select Logo</p>
                            <input type="file" id="logoUpload" accept="image/*" onchange="handleImageUpload(this, 'logoPreview', true)">
                        </div>
                        <div class="preview-area" id="logoPreview"></div>
                    </div>
                    <div class="form-group">
                        <label>YOUTUBE BANNER / THUMBNAIL</label>
                        <div class="file-upload-box">
                            <i class="fas fa-tv"></i>
                            <p style="font-size: 0.8rem; color: var(--text-muted)">Click to select Banner</p>
                            <input type="file" id="bannerUpload" accept="image/*" onchange="handleImageUpload(this, 'bannerPreview', true)">
                        </div>
                        <div class="preview-area" id="bannerPreview"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>PREVIEW SCREENSHOTS (MAX 5)</label>
                    <div class="file-upload-box">
                        <i class="fas fa-mobile-alt"></i>
                        <p style="font-size: 0.8rem; color: var(--text-muted)">Select multiple images (1-5)</p>
                        <input type="file" id="screenshotsUpload" accept="image/*" multiple onchange="handleMultipleImages(this)">
                    </div>
                    <div class="preview-area" id="screenshotsPreview"></div>
                </div>

                <div class="form-group">
                    <label>DOWNLOAD LINK</label>
                    <input type="url" id="downloadLink" class="form-control" placeholder="Direct or Drive Link">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>FILE PASSWORD</label>
                        <input type="text" id="filePassword" class="form-control" placeholder="Leave empty if none">
                    </div>
                    <div class="form-group">
                        <label>PASSWORD VIDEO LINK (YOUTUBE)</label>
                        <input type="url" id="videoLink" class="form-control" placeholder="https://youtube.com/...">
                    </div>
                </div>

                <div class="form-group">
                    <label>EXTRA LINKS (OPTIONAL)</label>
                    <div id="extraLinksContainer">
                        <div class="extra-link-row">
                            <input type="text" class="form-control link-title" placeholder="Title (e.g. Telegram)">
                            <input type="url" class="form-control link-url" placeholder="URL Link">
                        </div>
                        <div class="extra-link-row">
                            <input type="text" class="form-control link-title" placeholder="Title (e.g. YouTube)">
                            <input type="url" class="form-control link-url" placeholder="URL Link">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>APP DESCRIPTION</label>
                    <textarea id="appDescription" class="form-control" placeholder="Write app details, features etc..."></textarea>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 15px; background: var(--bg-input); padding: 10px; border-radius: 8px;">
                    <label style="margin: 0;">HIDE APP FROM USERS?</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="isHidden">
                        <span class="slider"></span>
                    </label>
                </div>

                <button class="btn btn-primary" id="btnAdd" onclick="saveApp()"><i class="fas fa-save"></i> PUBLISH APP</button>
                <button class="btn btn-update" id="btnUpdate" onclick="saveApp()"><i class="fas fa-sync"></i> UPDATE APP</button>
                <button class="btn btn-cancel" id="btnCancel" onclick="resetForm()"><i class="fas fa-times"></i> CANCEL EDIT</button>
            </div>

            <div class="admin-panel">
                <div class="panel-header">
                    <h2><i class="fas fa-database"></i> LIVE APPS</h2>
                    <input type="text" id="searchInput" class="form-control" style="width: 200px; padding: 0.5rem;" placeholder="Search..." onkeyup="filterList()">
                </div>
                <div class="list-container" id="listContainer">
                    <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">Loading Data...</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const DB_PATH = "MVX_VIP_SERVER_V5";

        // AUTHENTICATION CHECK
        if (!sessionStorage.getItem('mvx_admin_token')) {
            window.location.href = 'login.html';
        }

        // GLOBAL VARIABLES
        let allApps = [];
        let base64Logo = "";
        let base64Banner = "";
        let base64Screenshots = [];

        // DOM ELEMENTS
        const catWrapper = document.getElementById('categoryWrapper');
        const accessType = document.getElementById('accessType');
        const toastContainer = document.getElementById('toastContainer');

        // TOAST FUNCTION
        function showToast(msg, type='success') {
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--success)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--success)'}"></i> <span>${msg}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        // SMART CATEGORY TOGGLE
        function handleAccessChange() {
            if(accessType.value) {
                catWrapper.style.display = 'block';
            } else {
                catWrapper.style.display = 'none';
            }
        }

        // IMAGE TO BASE64 CONVERTER
        function handleImageUpload(input, previewId, isSingle) {
            const file = input.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const b64 = e.target.result;
                document.getElementById(previewId).innerHTML = `<img src="${b64}" class="preview-img">`;
                if(previewId === 'logoPreview') base64Logo = b64;
                if(previewId === 'bannerPreview') base64Banner = b64;
            };
            reader.readAsDataURL(file);
        }

        function handleMultipleImages(input) {
            const files = input.files;
            if(files.length > 5) {
                showToast("Maximum 5 screenshots allowed!", "error");
                return;
            }
            
            base64Screenshots = [];
            document.getElementById('screenshotsPreview').innerHTML = '';
            
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Screenshots.push(e.target.result);
                    document.getElementById('screenshotsPreview').innerHTML += `<img src="${e.target.result}" class="preview-img">`;
                };
                reader.readAsDataURL(file);
            });
        }

        // GATHER EXTRA LINKS
        function getExtraLinks() {
            let links = [];
            const rows = document.querySelectorAll('.extra-link-row');
            rows.forEach(row => {
                const title = row.querySelector('.link-title').value;
                const url = row.querySelector('.link-url').value;
                if(title && url) links.push({ title, url });
            });
            return links;
        }

        function populateExtraLinks(links) {
            const rows = document.querySelectorAll('.extra-link-row');
            rows[0].querySelector('.link-title').value = links[0] ? links[0].title : '';
            rows[0].querySelector('.link-url').value = links[0] ? links[0].url : '';
            rows[1].querySelector('.link-title').value = links[1] ? links[1].title : '';
            rows[1].querySelector('.link-url').value = links[1] ? links[1].url : '';
        }

        // SAVE OR UPDATE APP
        async function saveApp() {
            const appName = document.getElementById('appName').value;
            const access = accessType.value;
            const category = document.getElementById('appCategory').value;
            const downloadLink = document.getElementById('downloadLink').value;
            
            if(!appName || !access || !downloadLink) {
                showToast("Name, Access Type & Download Link required!", "error");
                return;
            }

            const appData = {
                appName: appName,
                version: document.getElementById('appVersion').value || 'v1.0',
                size: document.getElementById('appSize').value || 'N/A',
                accessType: access,
                gameCategory: category,
                logoBase64: base64Logo,
                bannerBase64: base64Banner,
                screenshots: base64Screenshots,
                downloadUrl: downloadLink,
                password: document.getElementById('filePassword').value,
                passwordVideoUrl: document.getElementById('videoLink').value,
                description: document.getElementById('appDescription').value,
                extraLinks: getExtraLinks(),
                isHidden: document.getElementById('isHidden').checked,
                timestamp: Date.now()
            };

            const editKey = document.getElementById('editKey').value;
            
            try {
                if(editKey) {
                    // Retain old images if new ones aren't uploaded
                    const existingData = allApps.find(a => a.key === editKey);
                    if(!base64Logo) appData.logoBase64 = existingData.logoBase64 || "";
                    if(!base64Banner) appData.bannerBase64 = existingData.bannerBase64 || "";
                    if(base64Screenshots.length === 0) appData.screenshots = existingData.screenshots || [];
                    
                    await database.ref(`${DB_PATH}/${editKey}`).update(appData);
                    showToast("App Updated Successfully!");
                } else {
                    await database.ref(DB_PATH).push(appData);
                    showToast("App Published Successfully!");
                }
                resetForm();
            } catch (error) {
                showToast(error.message, "error");
            }
        }

        // LOAD DATA & RENDER LIST
        database.ref(DB_PATH).on('value', (snap) => {
            const data = snap.val();
            const list = document.getElementById('listContainer');
            list.innerHTML = '';
            allApps = [];

            if(!data) {
                list.innerHTML = '<p style="text-align:center; color:gray;">No Apps Found</p>';
                return;
            }

            allApps = Object.entries(data).map(([key, val]) => ({key, ...val})).reverse();
            renderList(allApps);
        });

        function renderList(apps) {
            const list = document.getElementById('listContainer');
            list.innerHTML = '';
            apps.forEach(app => {
                const isHidden = app.isHidden ? '<span class="badge hidden"><i class="fas fa-eye-slash"></i> Hidden</span>' : '';
                const logoSrc = app.logoBase64 || 'https://cdn-icons-png.flaticon.com/512/564/564619.png';
                
                list.innerHTML += `
                    <div class="list-item" style="${app.isHidden ? 'opacity:0.6' : ''}">
                        <div class="item-info">
                            <img src="${logoSrc}" class="item-icon">
                            <div class="item-details">
                                <h4>${app.appName} <span class="badge">${app.accessType}</span> ${isHidden}</h4>
                                <span style="font-size:0.75rem; color:var(--text-muted)">${app.gameCategory} | ${app.version}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <div class="action-btn edit" onclick='editApp("${app.key}")'><i class="fas fa-edit"></i></div>
                            <div class="action-btn delete" onclick='deleteApp("${app.key}")'><i class="fas fa-trash"></i></div>
                        </div>
                    </div>
                `;
            });
        }

        // EDIT & DELETE
        function editApp(key) {
            const app = allApps.find(a => a.key === key);
            if(!app) return;

            document.getElementById('editKey').value = key;
            document.getElementById('appName').value = app.appName;
            document.getElementById('appVersion').value = app.version || '';
            document.getElementById('appSize').value = app.size || '';
            
            accessType.value = app.accessType;
            handleAccessChange();
            setTimeout(() => { document.getElementById('appCategory').value = app.gameCategory; }, 50);

            document.getElementById('downloadLink').value = app.downloadUrl || '';
            document.getElementById('filePassword').value = app.password || '';
            document.getElementById('videoLink').value = app.passwordVideoUrl || '';
            document.getElementById('appDescription').value = app.description || '';
            document.getElementById('isHidden').checked = app.isHidden || false;

            if(app.extraLinks) populateExtraLinks(app.extraLinks);

            // Set Image Previews
            base64Logo = ""; base64Banner = ""; base64Screenshots = [];
            document.getElementById('logoPreview').innerHTML = app.logoBase64 ? `<img src="${app.logoBase64}" class="preview-img">` : '';
            document.getElementById('bannerPreview').innerHTML = app.bannerBase64 ? `<img src="${app.bannerBase64}" class="preview-img">` : '';
            
            document.getElementById('screenshotsPreview').innerHTML = '';
            if(app.screenshots) {
                app.screenshots.forEach(img => {
                    document.getElementById('screenshotsPreview').innerHTML += `<img src="${img}" class="preview-img">`;
                });
            }

            document.getElementById('modeDisplay').innerHTML = '<i class="fas fa-edit" style="color:var(--gold)"></i> EDITING APP';
            document.getElementById('btnAdd').style.display = 'none';
            document.getElementById('btnUpdate').style.display = 'block';
            document.getElementById('btnCancel').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteApp(key) {
            if(confirm("Are you sure you want to delete this app?")) {
                database.ref(`${DB_PATH}/${key}`).remove()
                .then(() => showToast("App Deleted!"))
                .catch(e => showToast(e.message, "error"));
            }
        }

        // RESET FORM
        function resetForm() {
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if(el.type === 'checkbox') el.checked = false;
                else el.value = '';
            });
            document.getElementById('logoPreview').innerHTML = '';
            document.getElementById('bannerPreview').innerHTML = '';
            document.getElementById('screenshotsPreview').innerHTML = '';
            base64Logo = ""; base64Banner = ""; base64Screenshots = [];
            
            catWrapper.style.display = 'none';
            document.getElementById('modeDisplay').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> UPLOAD NEW APP';
            document.getElementById('btnAdd').style.display = 'block';
            document.getElementById('btnUpdate').style.display = 'none';
            document.getElementById('btnCancel').style.display = 'none';
        }

        // SEARCH
        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allApps.filter(a => a.appName.toLowerCase().includes(term) || a.gameCategory.toLowerCase().includes(term));
            renderList(filtered);
        }

        // LOGOUT
        function logoutSystem() {
            sessionStorage.removeItem('mvx_admin_token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
