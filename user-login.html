<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>User Authentication | MVX STORE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX STORE - USER LOGIN & PROFILE (DB SYNC FIX)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --bg-void: #000000; --bg-card: #0c101a; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.95); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --font-head: 'Rajdhani', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.03) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; animation: gridShift 15s linear infinite; }
        .glow-orb { position: absolute; width: 60vmax; height: 60vmax; border-radius: 50%; background: radial-gradient(circle at center, rgba(0, 230, 184, 0.1) 0%, transparent 70%); filter: blur(50px); z-index: -1; animation: orbFloat 10s ease-in-out infinite alternate; }
        @keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }
        @keyframes orbFloat { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .back-btn { background: var(--glass-bg); border: var(--glass-border); color: var(--text-primary); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-family: var(--font-head); font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }

        .auth-container { width: 100%; max-width: 450px; padding: 30px; background: var(--glass-bg); backdrop-filter: blur(15px); border: var(--glass-border); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 5; text-align: center; position: relative; overflow-y: auto; max-height: 90vh; }
        .auth-container::-webkit-scrollbar { display: none; }
        
        .brand-logo { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; text-align: left; position: relative; }
        .input-group i { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); color: var(--text-muted); }
        .form-control { width: 100%; padding: 15px 15px 15px 45px; background: var(--bg-input); border: 1px solid #333; border-radius: 10px; color: #fff; font-family: var(--font-body); font-size: 1rem; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }

        .btn { width: 100%; padding: 15px; border-radius: 10px; font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }
        .toggle-link { color: var(--primary); cursor: pointer; text-decoration: underline; font-weight: 600; }

        /* Profile UI */
        .profile-section { display: none; text-align: center; animation: fadeIn 0.4s ease; }
        
        .profile-avatar-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .profile-avatar-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--primary); padding: 3px; background: var(--bg-input); object-fit: cover; }
        .avatar-edit-overlay { position: absolute; bottom: 0; right: 0; background: var(--primary); color: #000; width: 35px; height: 35px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 3px solid var(--bg-card); transition: 0.3s; }
        .avatar-edit-overlay:hover { transform: scale(1.1); box-shadow: 0 0 10px var(--primary); }
        .btn-remove-photo { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.85rem; margin-bottom: 15px; text-decoration: underline; display: none; }

        .name-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .profile-name { font-family: var(--font-head); font-size: 1.8rem; font-weight: 700; }
        .edit-name-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .edit-name-btn:hover { color: #fff; }

        .edit-name-box { display: none; margin-bottom: 15px; }
        .edit-name-box input { padding: 10px 15px; margin-bottom: 10px; }
        .edit-name-box .btn { padding: 10px; font-size: 1rem; margin-bottom: 5px; }

        .profile-email { color: var(--primary); font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; background: var(--primary-dim); padding: 5px 15px; border-radius: 100px; display: inline-block; margin-bottom: 30px; }
        
        .btn-danger { background: var(--bg-input); border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; box-shadow: 0 0 20px rgba(255,0,60,0.3); transform: translateY(-2px); }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-input); border-left: 4px solid var(--primary); padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; animation: slideIn 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: 500; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--glass-bg); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 20; border-radius: 20px; flex-direction: column; }
        .loading-overlay i { font-size: 3rem; color: var(--primary); animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="glow-orb"></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="top-bar">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> BACK TO STORE</a>
    </div>

    <div class="auth-container">
        <div class="loading-overlay" id="loadingOverlay">
            <i class="fas fa-circle-notch"></i>
            <p style="font-family: var(--font-head); font-weight: bold; margin-top: 10px;">Processing...</p>
        </div>

        <div class="brand-logo">MVX SYSTEM</div>
        <div class="subtitle">Secure Authentication Portal</div>

        <div class="form-section active" id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" class="form-control" placeholder="Email Address" autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" class="form-control" placeholder="Password" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="login()"><i class="fas fa-sign-in-alt"></i> SECURE LOGIN</button>
            <button class="btn" style="background: #db4437; color: white;" onclick="googleLogin()">
                <i class="fab fa-google"></i> LOGIN WITH GOOGLE
            </button>
            <p style="margin-top: 20px; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <span class="toggle-link" onclick="toggleView('registerForm')">Create one</span>
            </p>
        </div>

        <div class="form-section" id="registerForm">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regName" class="form-control" placeholder="Full Name" autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="regEmail" class="form-control" placeholder="Email Address" autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" class="form-control" placeholder="Create Password (Min 6 chars)" autocomplete="off">
            </div>
            <button class="btn btn-primary" onclick="register()"><i class="fas fa-user-plus"></i> REGISTER ACCOUNT</button>
            <button class="btn" style="background: #db4437; color: white;" onclick="googleLogin()">
                <i class="fab fa-google"></i> CONTINUE WITH GOOGLE
            </button>
            <p style="margin-top: 20px; color: var(--text-muted); font-size: 0.9rem;">
                Already registered? <span class="toggle-link" onclick="toggleView('loginForm')">Login here</span>
            </p>
        </div>

        <div class="profile-section" id="profileSection">
            
            <div class="profile-avatar-container">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="profileImage" class="profile-avatar-img">
                <div class="avatar-edit-overlay" onclick="document.getElementById('avatarInput').click()">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <input type="file" id="avatarInput" accept="image/*" hidden onchange="uploadAvatar(this)">
            <button class="btn-remove-photo" id="btnRemoveAvatar" onclick="removeAvatar()">Remove Photo</button>

            <div class="name-container" id="nameDisplayBox">
                <h2 class="profile-name" id="userName">User Name</h2>
                <button class="edit-name-btn" onclick="openNameEdit()"><i class="fas fa-edit"></i></button>
            </div>

            <div class="edit-name-box" id="editNameBox">
                <input type="text" id="editNameInput" class="form-control" placeholder="New Name">
                <button class="btn btn-primary" onclick="saveNewName()">Save Name</button>
                <button class="btn" style="background: #333; color: #fff;" onclick="closeNameEdit()">Cancel</button>
            </div>

            <div class="profile-email" id="userEmail">user@email.com</div>
            
            <button class="btn btn-primary" onclick="window.location.href='index.html'">
                <i class="fas fa-store"></i> GO TO APP STORE
            </button>
            
            <button class="btn" style="background: var(--bg-input); border: 1px solid var(--primary); color: var(--primary);" onclick="window.location.href='lua-admin-free.html'">
                <i class="fas fa-key"></i> FREE LUA KEY GENERATOR
            </button>

            <button class="btn btn-danger" onclick="logout()" style="margin-top: 15px;">
                <i class="fas fa-power-off"></i> LOGOUT SESSION
            </button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.database();
        let currentUserData = null;

        // UI Controls
        function showToast(msg, type='success') {
            const toastContainer = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--primary)'}"></i> <span>${msg}</span>`;
            toastContainer.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function toggleView(viewId) {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('profileSection').style.display = 'none';
            document.querySelector('.subtitle').style.display = 'block';
            
            if(viewId === 'profileSection') {
                document.getElementById('profileSection').style.display = 'block';
                document.querySelector('.subtitle').style.display = 'none';
            } else {
                document.getElementById(viewId).classList.add('active');
            }
        }

        function showLoader(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Auth State Listener (FIXED: Fetches Data from DB)
        auth.onAuthStateChanged((user) => {
            showLoader(false);
            if (user) {
                if (!user.emailVerified) {
                    showToast('ইমেইল ভেরিফাই করা নেই! দয়া করে মেইল চেক করুন।', 'error');
                    auth.signOut();
                    toggleView('loginForm');
                    return;
                }

                currentUserData = user;
                
                // Fetch User Data from Realtime DB (For Profile Pic & Name)
                db.ref('registered_users/' + user.uid).once('value', snap => {
                    const data = snap.val() || {};
                    const dbName = data.name || user.displayName || 'MVX User';
                    const dbPhoto = data.photoURL || user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                    
                    document.getElementById('userName').innerText = dbName;
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('profileImage').src = dbPhoto;
                    
                    if(dbPhoto !== "https://cdn-icons-png.flaticon.com/512/149/149071.png") {
                        document.getElementById('btnRemoveAvatar').style.display = 'inline-block';
                    } else {
                        document.getElementById('btnRemoveAvatar').style.display = 'none';
                    }
                });

                toggleView('profileSection');
                
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                if(redirect) window.location.href = redirect;

            } else {
                toggleView('loginForm');
            }
        });

        // --- PROFILE PICTURE LOGIC (DB FIX) ---
        function uploadAvatar(input) {
            const file = input.files[0];
            if(file) {
                if(file.size > 2 * 1024 * 1024) {
                    input.value = "";
                    return showToast("ছবি ২MB এর বেশি হতে পারবে না!", "error");
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const b64 = e.target.result;
                    showLoader(true);
                    
                    // Save to Realtime Database instead of Auth Profile
                    db.ref('registered_users/' + currentUserData.uid).update({ 
                        photoURL: b64 
                    }).then(() => {
                        document.getElementById('profileImage').src = b64;
                        document.getElementById('btnRemoveAvatar').style.display = 'inline-block';
                        showLoader(false);
                        showToast("প্রোফাইল ছবি আপডেট হয়েছে!");
                    }).catch(err => {
                        showLoader(false);
                        showToast("Error: " + err.message, "error");
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function removeAvatar() {
            showLoader(true);
            db.ref('registered_users/' + currentUserData.uid).update({ 
                photoURL: null 
            }).then(() => {
                document.getElementById('profileImage').src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('btnRemoveAvatar').style.display = 'none';
                showLoader(false);
                showToast("ছবি রিমুভ করা হয়েছে!");
            });
        }

        function openNameEdit() {
            document.getElementById('nameDisplayBox').style.display = 'none';
            document.getElementById('editNameBox').style.display = 'block';
            document.getElementById('editNameInput').value = document.getElementById('userName').innerText;
            document.getElementById('editNameInput').focus();
        }

        function closeNameEdit() {
            document.getElementById('nameDisplayBox').style.display = 'flex';
            document.getElementById('editNameBox').style.display = 'none';
        }

        function saveNewName() {
            const newName = document.getElementById('editNameInput').value.trim();
            if(!newName) return showToast("নাম খালি রাখা যাবে না!", "error");
            
            showLoader(true);
            
            // Update in DB and Auth
            const updates = {};
            updates['registered_users/' + currentUserData.uid + '/name'] = newName;
            
            db.ref().update(updates).then(() => {
                // Also update Auth profile for consistency
                return currentUserData.updateProfile({ displayName: newName });
            }).then(() => {
                document.getElementById('userName').innerText = newName;
                closeNameEdit();
                showLoader(false);
                showToast("নাম পরিবর্তন সফল হয়েছে!");
            });
        }

        // --- AUTH FUNCTIONS ---
        function login() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            if(!email || !pass) return showToast('ইমেইল এবং পাসওয়ার্ড দিন', 'error');
            
            showLoader(true);
            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                showLoader(false);
                showToast('লগইন ব্যর্থ হয়েছে: ইমেইল বা পাসওয়ার্ড ভুল।', 'error');
            });
        }

        function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            
            if(!name || !email || !pass) return showToast('সব তথ্য পূরণ করুন', 'error');
            if(pass.length < 6) return showToast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!', 'error');
            
            showLoader(true);
            auth.createUserWithEmailAndPassword(email, pass)
                .then((result) => {
                    return result.user.updateProfile({ displayName: name }).then(() => result.user);
                })
                .then((user) => {
                    user.sendEmailVerification();
                    showToast('একাউন্ট তৈরি হয়েছে! ভেরিফিকেশন মেইল পাঠানো হয়েছে।');
                    
                    db.ref('registered_users/' + user.uid).set({
                        name: name,
                        email: email,
                        joinedAt: Date.now()
                    });

                    auth.signOut();
                    setTimeout(() => toggleView('loginForm'), 2000);
                })
                .catch(err => {
                    showLoader(false);
                    if(err.code === 'auth/email-already-in-use') {
                        showToast('এই ইমেইল দিয়ে আগে থেকেই অ্যাকাউন্ট আছে।', 'error');
                        setTimeout(() => toggleView('loginForm'), 1500);
                    } else { showToast(err.message, 'error'); }
                });
        }

        function googleLogin() {
            showLoader(true);
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then((result) => {
                showToast('Google Login Successful!');
                db.ref('registered_users/' + result.user.uid).update({
                    name: result.user.displayName, email: result.user.email, joinedAt: Date.now()
                });
            }).catch(() => {
                showLoader(false);
                showToast('গুগল লগইন বাতিল হয়েছে।', 'error');
            });
        }

        function logout() {
            showLoader(true);
            auth.signOut().then(() => showToast('লগআউট সফল হয়েছে!'));
        }
    </script>
</body>
</html>
