<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>User Authentication & Profile | MVX STORE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ==========================================================================
           MVX STORE - USER LOGIN & PROFILE PAGE (UPDATED WITH BASE64 UPLOAD)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-void); color: var(--text-primary); 
            font-family: var(--font-body); min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow-x: hidden; position: relative;
        }

        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: -1; }
        .glow-orb { position: absolute; width: 50vmax; height: 50vmax; border-radius: 50%; background: radial-gradient(circle at center, rgba(0, 230, 184, 0.1) 0%, transparent 70%); filter: blur(50px); pointer-events: none; z-index: -1; }

        /* Auth Container */
        .auth-container { 
            width: 90%; max-width: 400px; 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); 
            border: var(--glass-border); padding: 30px 25px; 
            border-radius: 20px; box-shadow: 0 0 30px rgba(0, 230, 184, 0.1); 
            text-align: center; z-index: 10;
            animation: fadeInGlobal 0.4s ease;
        }

        .auth-logo { font-family: var(--font-head); font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; }
        .auth-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }

        /* Input Groups */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; }
        .form-control { 
            width: 100%; background: var(--bg-input); border: 1px solid #333; 
            color: #fff; padding: 15px 15px 15px 45px; border-radius: 12px; 
            font-size: 1rem; outline: none; transition: 0.3s; 
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }

        /* Buttons */
        .btn-auth { 
            width: 100%; background: var(--primary); color: #000; 
            padding: 15px; border: none; border-radius: 12px; 
            font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; 
            cursor: pointer; transition: 0.3s; margin-top: 10px; 
        }
        .btn-auth:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }

        .btn-google { 
            width: 100%; background: #fff; color: #000; 
            padding: 15px; border: none; border-radius: 12px; 
            font-family: var(--font-body); font-weight: 600; font-size: 1rem; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; 
            margin-top: 15px; 
        }
        .btn-google:hover { background: #f1f1f1; transform: translateY(-2px); }
        .btn-google img { width: 20px; }

        .auth-switch { margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); }
        .auth-switch span { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }

        .divider { display: flex; align-items: center; margin: 20px 0; color: #555; font-size: 0.9rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        .back-btn { position: absolute; top: 20px; left: 20px; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; text-decoration: none; z-index: 20; transition: 0.3s; }
        .back-btn:hover { color: var(--primary); }

        /* --- PROFILE VIEW SECTION --- */
        .profile-header { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); background: var(--bg-input); }
        .edit-img-btn { 
            position: absolute; bottom: 0; right: 0; background: var(--primary); 
            color: #000; border: none; width: 32px; height: 32px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .edit-img-btn:hover { transform: scale(1.1); }

        .profile-info { margin-bottom: 25px; }
        .profile-info input { text-align: center; padding: 12px; margin-bottom: 10px; font-weight: bold; }
        .profile-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; font-family: 'Share Tech Mono', monospace; }

        .btn-logout { background: var(--danger); color: #fff; margin-top: 15px; }
        .btn-logout:hover { box-shadow: 0 0 20px var(--danger-dim); }
        .btn-save { background: var(--gold); color: #000; margin-top: 5px; display: none; }

        /* Hidden Views */
        #signupView, #profileView { display: none; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="glow-orb"></div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div class="auth-container" id="loginView">
        <div class="auth-logo">MVX SYSTEM</div>
        <div class="auth-subtitle">Welcome Back, User!</div>
        
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" class="form-control" placeholder="Email Address">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPass" class="form-control" placeholder="Password">
        </div>
        
        <button class="btn-auth" onclick="loginUser()"><i class="fas fa-sign-in-alt"></i> LOGIN</button>
        
        <div class="divider">OR</div>
        
        <button class="btn-google" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google"> Continue with Google
        </button>
        
        <div class="auth-switch">Don't have an account? <span onclick="switchView('signupView')">Sign Up</span></div>
    </div>

    <div class="auth-container" id="signupView">
        <div class="auth-logo">CREATE ACCOUNT</div>
        <div class="auth-subtitle">Join the MVX Community</div>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="signupName" class="form-control" placeholder="Full Name">
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" class="form-control" placeholder="Email Address">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPass" class="form-control" placeholder="Create Password">
        </div>
        
        <button class="btn-auth" onclick="signupUser()"><i class="fas fa-user-plus"></i> SIGN UP</button>
        
        <div class="auth-switch">Already have an account? <span onclick="switchView('loginView')">Login</span></div>
    </div>

    <div class="auth-container" id="profileView">
        <div class="profile-header">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="userProfileImg" class="profile-img" alt="Profile">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleProfileImageSelect(this)">
            <button class="edit-img-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
        </div>
        
        <div class="profile-info">
            <div class="input-group">
                <i class="fas fa-user-edit"></i>
                <input type="text" id="profileNameInput" class="form-control" placeholder="Your Name" oninput="showSaveBtn()">
            </div>
            <div class="profile-email" id="userEmailDisplay">user@example.com</div>
        </div>
        
        <button class="btn-auth btn-save" id="saveProfileBtn" onclick="saveProfileChanges()"><i class="fas fa-save"></i> SAVE CHANGES</button>
        <button class="btn-auth" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> GO TO STORE</button>
        <button class="btn-auth btn-logout" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
    </div>

    <script src="main.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const database = firebase.database();
        
        let currentUserData = null;
        let selectedBase64Image = null;

        // View Switcher
        function switchView(viewId) {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('signupView').style.display = 'none';
            document.getElementById('profileView').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
        }

        // Auth State Tracker
        auth.onAuthStateChanged((user) => {
            if (user) {
                switchView('profileView');
                loadUserProfile(user);
                
                // Redirect check (from feedback or free admin)
                const urlParams = new URLSearchParams(window.location.search);
                const redirectPath = urlParams.get('redirect');
                if(redirectPath) {
                    showGlobalToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = redirectPath; }, 1500);
                }
            } else {
                switchView('loginView');
            }
        });

        // --- LOGIN LOGIC ---
        function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if(!email || !pass) return showGlobalToast('Please enter email and password', 'warning');
            
            showDarkLoader('Logging In');
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => { hideDarkLoader(); showGlobalToast('Welcome Back!', 'success'); })
                .catch(err => { hideDarkLoader(); showGlobalToast(err.message, 'error'); });
        }

        // --- SIGNUP LOGIC ---
        function signupUser() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPass').value.trim();
            
            if(!name || !email || !pass) return showGlobalToast('All fields are required', 'warning');
            
            showDarkLoader('Creating Account');
            auth.createUserWithEmailAndPassword(email, pass)
                .then((cred) => {
                    // Save default profile to DB
                    return database.ref('registered_users/' + cred.user.uid).set({
                        name: name,
                        email: email,
                        profilePicBase64: "", // খালি থাকবে প্রথমে
                        joinedAt: Date.now()
                    });
                })
                .then(() => { hideDarkLoader(); showGlobalToast('Account Created Successfully!', 'success'); })
                .catch(err => { hideDarkLoader(); showGlobalToast(err.message, 'error'); });
        }

        // --- GOOGLE LOGIN ---
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            showDarkLoader('Connecting to Google');
            auth.signInWithPopup(provider)
                .then((result) => {
                    // Check if exists in DB, if not add them
                    database.ref('registered_users/' + result.user.uid).once('value').then(snap => {
                        if(!snap.exists()) {
                            database.ref('registered_users/' + result.user.uid).set({
                                name: result.user.displayName,
                                email: result.user.email,
                                profilePicBase64: "", // We let them upload custom Base64 later
                                joinedAt: Date.now()
                            });
                        }
                    });
                    hideDarkLoader(); 
                    showGlobalToast('Google Login Successful!', 'success');
                })
                .catch(err => { hideDarkLoader(); showGlobalToast(err.message, 'error'); });
        }

        // --- PROFILE LOGIC (LOAD, EDIT, BASE64 UPLOAD) ---
        function loadUserProfile(user) {
            document.getElementById('userEmailDisplay').innerText = user.email;
            
            // Fetch custom name and profile pic from DB
            database.ref('registered_users/' + user.uid).on('value', (snap) => {
                if(snap.exists()) {
                    const data = snap.val();
                    currentUserData = data;
                    document.getElementById('profileNameInput').value = data.name || user.displayName || 'MVX User';
                    
                    if(data.profilePicBase64 && data.profilePicBase64 !== "") {
                        document.getElementById('userProfileImg').src = data.profilePicBase64;
                    } else if(user.photoURL) {
                        document.getElementById('userProfileImg').src = user.photoURL;
                    }
                }
            });
        }

        // Image Selection -> Base64
        function handleProfileImageSelect(input) {
            const file = input.files[0];
            if(file) {
                if(file.size > 1.5 * 1024 * 1024) { // 1.5 MB Limit
                    showGlobalToast("Image size must be less than 1.5MB!", "error");
                    input.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedBase64Image = e.target.result;
                    document.getElementById('userProfileImg').src = selectedBase64Image;
                    showSaveBtn();
                };
                reader.readAsDataURL(file);
            }
        }

        function showSaveBtn() {
            document.getElementById('saveProfileBtn').style.display = 'block';
        }

        // Save Custom Name & Base64 Image to DB
        function saveProfileChanges() {
            const newName = document.getElementById('profileNameInput').value.trim();
            if(!newName) return showGlobalToast('Name cannot be empty!', 'error');

            showDarkLoader('Saving Profile');
            
            let updates = { name: newName };
            if(selectedBase64Image) {
                updates.profilePicBase64 = selectedBase64Image;
            }

            database.ref('registered_users/' + auth.currentUser.uid).update(updates)
                .then(() => {
                    hideDarkLoader();
                    document.getElementById('saveProfileBtn').style.display = 'none';
                    showGlobalToast('Profile Updated Successfully!', 'success');
                })
                .catch(err => { hideDarkLoader(); showGlobalToast(err.message, 'error'); });
        }

        // --- LOGOUT ---
        function logoutUser() {
            showDarkLoader('Logging Out');
            auth.signOut()
                .then(() => { hideDarkLoader(); showGlobalToast('Logged out successfully', 'success'); })
                .catch(err => { hideDarkLoader(); showGlobalToast(err.message, 'error'); });
        }
    </script>
</body>
</html>
