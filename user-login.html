<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>User Authentication | MVX STORE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX STORE - USER LOGIN & PROFILE PAGE
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --bg-void: #000000; --bg-card: #0c101a; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.8); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --font-head: 'Rajdhani', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* Background Effects */
        .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 230, 184, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 184, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: -1; }
        .glow-orb { position: fixed; width: 50vmax; height: 50vmax; border-radius: 50%; background: radial-gradient(circle at center, rgba(0, 230, 184, 0.1) 0%, transparent 70%); filter: blur(50px); pointer-events: none; z-index: -1; top: 10%; left: 50%; transform: translateX(-50%); }

        /* Navbar */
        .navbar { position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: blur(10px); border-bottom: var(--glass-border); height: 60px; display: flex; align-items: center; padding: 0 20px; z-index: 100; gap: 15px; }
        .back-btn { background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .back-btn:hover { color: var(--primary); }
        .nav-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--primary); }

        /* Main Container */
        .auth-container { max-width: 450px; width: 90%; margin: 40px auto; background: var(--bg-card); padding: 30px 20px; border-radius: 20px; border: var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; position: relative; overflow: hidden; }
        
        /* Auth Tabs */
        .auth-tabs { display: flex; margin-bottom: 25px; background: var(--bg-input); border-radius: 12px; padding: 5px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary-dim); }

        /* Form Areas */
        .auth-form { display: none; animation: fadeIn 0.4s ease; text-align: left; }
        .auth-form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; }
        .form-control { width: 100%; background: var(--bg-input); border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s; font-family: var(--font-body); }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-dim); }

        /* Buttons */
        .btn { width: 100%; padding: 15px; border-radius: 10px; font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: #000; margin-bottom: 15px; }
        .btn-primary:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }
        .btn-google { background: #fff; color: #000; }
        .btn-google:hover { background: #f1f1f1; transform: translateY(-2px); }

        /* Divider */
        .divider { display: flex; align-items: center; text-align: center; margin: 20px 0; color: var(--text-muted); font-size: 0.9rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        /* User Profile Area (Hidden by default) */
        .profile-area { display: none; text-align: center; animation: fadeIn 0.4s ease; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); margin: 0 auto 15px; background: var(--bg-input); font-size: 3rem; display: flex; justify-content: center; align-items: center; color: var(--primary); }
        .profile-name { font-size: 1.5rem; color: #fff; font-family: var(--font-head); font-weight: 700; margin-bottom: 5px; }
        .profile-email { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 25px; }

        /* Toast Message */
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-input); border-left: 4px solid var(--primary); padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: 500; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Loader Overlay */
        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(12, 16, 26, 0.9); z-index: 10; display: none; justify-content: center; align-items: center; flex-direction: column; border-radius: 20px; }
        .loader-overlay i { font-size: 3rem; color: var(--primary); margin-bottom: 15px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <div class="glow-orb"></div>
    <div class="toast-container" id="toastContainer"></div>

    <nav class="navbar">
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
        <span class="nav-title">USER ACCOUNT</span>
    </nav>

    <div class="auth-container">
        <div class="loader-overlay" id="loaderOverlay">
            <i class="fas fa-circle-notch"></i>
            <p style="color: var(--primary); font-family: var(--font-head); font-weight: 700;">PROCESSING...</p>
        </div>

        <div id="authSection">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
                <button class="tab-btn" onclick="switchTab('register')">REGISTER</button>
            </div>

            <div class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="logEmail" class="form-control" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="logPassword" class="form-control" placeholder="Enter password">
                </div>
                <button class="btn btn-primary" onclick="loginWithEmail()"><i class="fas fa-sign-in-alt"></i> SIGN IN</button>
            </div>

            <div class="auth-form" id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Create password (min 6 chars)">
                </div>
                <button class="btn btn-primary" onclick="registerWithEmail()"><i class="fas fa-user-plus"></i> CREATE ACCOUNT</button>
            </div>

            <div class="divider">OR CONTINUE WITH</div>

            <button class="btn btn-google" onclick="googleSignIn()">
                <img src="https://cdn-icons-png.flaticon.com/512/3002/3002219.png" width="20" alt="Google"> SIGN IN WITH GOOGLE
            </button>
        </div>

        <div class="profile-area" id="profileSection">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h2 class="profile-name" id="userName">User Name</h2>
            <p class="profile-email" id="userEmail">user@email.com</p>
            
            <button class="btn btn-primary" onclick="window.location.href='index.html'" style="margin-bottom: 10px;">
                <i class="fas fa-home"></i> GO TO STORE
            </button>
            <button class="btn" style="background: var(--danger); color: #fff;" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> LOGOUT
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // --- UI Functions ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast`;
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--primary)'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function toggleLoader(show) {
            document.getElementById('loaderOverlay').style.display = show ? 'flex' : 'none';
        }

        function checkAuthState() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    // User is signed in, show profile
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('profileSection').style.display = 'block';
                    document.getElementById('userName').innerText = user.displayName || 'MVX User';
                    document.getElementById('userEmail').innerText = user.email;
                    
                    // Optional: Auto redirect to store if newly logged in
                    if(sessionStorage.getItem('just_logged_in') === 'true') {
                        sessionStorage.removeItem('just_logged_in');
                        setTimeout(() => window.location.href = 'index.html', 1500);
                    }
                } else {
                    // No user is signed in, show forms
                    document.getElementById('authSection').style.display = 'block';
                    document.getElementById('profileSection').style.display = 'none';
                }
            });
        }

        // --- Auth Functions ---
        function loginWithEmail() {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPassword').value;
            if(!email || !pass) return showToast('Please enter email and password!', 'error');
            
            toggleLoader(true);
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    toggleLoader(false);
                    showToast('Login Successful! Redirecting...');
                    sessionStorage.setItem('just_logged_in', 'true');
                })
                .catch(err => {
                    toggleLoader(false);
                    showToast(err.message, 'error');
                });
        }

        function registerWithEmail() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPassword').value;
            if(!name || !email || !pass) return showToast('Please fill all fields!', 'error');
            
            toggleLoader(true);
            auth.createUserWithEmailAndPassword(email, pass)
                .then((result) => {
                    return result.user.updateProfile({ displayName: name });
                })
                .then(() => {
                    toggleLoader(false);
                    showToast('Account Created Successfully!');
                    sessionStorage.setItem('just_logged_in', 'true');
                })
                .catch(err => {
                    toggleLoader(false);
                    showToast(err.message, 'error');
                });
        }

        function googleSignIn() {
            toggleLoader(true);
            auth.signInWithPopup(googleProvider)
                .then(() => {
                    toggleLoader(false);
                    showToast('Google Login Successful!');
                    sessionStorage.setItem('just_logged_in', 'true');
                })
                .catch(err => {
                    toggleLoader(false);
                    showToast(err.message, 'error');
                });
        }

        function logout() {
            toggleLoader(true);
            auth.signOut().then(() => {
                toggleLoader(false);
                showToast('Logged out successfully');
                document.getElementById('logEmail').value = '';
                document.getElementById('logPassword').value = '';
            });
        }

        // Initialize state checker
        checkAuthState();
    </script>
</body>
</html>
