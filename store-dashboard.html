<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>STORE ADMIN DASHBOARD | MVX SYSTEM v4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ==========================================================================
           MVX STORE ADMIN DASHBOARD V4.0 (FULL PRESERVED LOGIC)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        html, body { max-width: 100vw; overflow-x: hidden; }

        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --warning: #ffd700;
            --bg-void: #000000; --bg-card: #0c101a; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --font-head: 'Orbitron', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { background: var(--bg-card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .brand { font-family: var(--font-head); font-size: 1.5rem; color: var(--primary); font-weight: 700; }
        .logout-btn { background: var(--danger); color: #fff; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .dashboard-container { padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        /* Form Card */
        .form-card { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid #333; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .form-card h2 { color: var(--primary); font-family: var(--font-head); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media(max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .input-group label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
        .input-group input, .input-group select, .input-group textarea { background: var(--bg-input); border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; width: 100%; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: var(--primary); }
        
        /* Image Upload Dual Method UI */
        .image-upload-wrapper { display: flex; gap: 10px; align-items: center; }
        .image-upload-wrapper input[type="text"] { flex: 1; }
        .file-btn { background: #333; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .file-btn:hover { background: #444; }

        .btn-submit { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; font-family: var(--font-head); font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { box-shadow: 0 0 15px var(--primary-dim); }

        /* Update Checkbox */
        .update-checkbox-group { background: rgba(255, 215, 0, 0.1); border-left: 4px solid var(--warning); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .update-checkbox-group input { width: 20px; height: 20px; cursor: pointer; }
        .update-checkbox-group label { color: var(--warning); font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* App List Table */
        .table-responsive { overflow-x: auto; background: var(--bg-card); border-radius: 12px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: var(--bg-input); color: var(--primary); font-family: var(--font-head); }
        td img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
        
        .action-btns button { background: none; border: none; cursor: pointer; font-size: 1.2rem; margin-right: 10px; transition: 0.2s; }
        .btn-edit { color: var(--primary); }
        .btn-del { color: var(--danger); }
        .btn-hide { color: var(--warning); }
    </style>
</head>
<body>

    <header class="header">
        <div class="brand">STORE ADMIN</div>
        <div>
            <button class="logout-btn" onclick="window.location.href='index.html'">GO TO STORE</button>
            <button class="logout-btn" onclick="logout()" style="margin-left: 10px;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="dashboard-container">
        
        <div class="form-card" id="uploadFormCard">
            <h2 id="formTitle"><i class="fas fa-cloud-upload-alt"></i> Upload New App</h2>
            
            <div class="update-checkbox-group" id="updateGroup" style="display: none;">
                <input type="checkbox" id="isAppUpdate">
                <label for="isAppUpdate">Mark as NEW UPDATE (Resets Time & Adds Badge)</label>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>App Name *</label>
                    <input type="text" id="appName" placeholder="e.g. Free Fire Mod">
                </div>
                <div class="input-group">
                    <label>Category *</label>
                    <select id="category">
                        <option value="Free Fire">Free Fire</option>
                        <option value="PUBG">PUBG</option>
                        <option value="Blood Strike">Blood Strike</option>
                        <option value="Tools">Tools</option>
                        <option value="Other Game">Other Game</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Access Type *</label>
                    <select id="accessType">
                        <option value="Free">Free</option>
                        <option value="Premium">Premium</option>
                        <option value="Paid">Paid</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Version</label>
                    <input type="text" id="version" placeholder="e.g. v1.0">
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>App Size</label>
                    <input type="text" id="size" placeholder="e.g. 150 MB">
                </div>
                <div class="input-group">
                    <label>Download Link *</label>
                    <input type="url" id="downloadUrl" placeholder="Google Drive / MediaFire">
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Banner Image (URL or Select File) *</label>
                    <div class="image-upload-wrapper">
                        <input type="text" id="bannerValue" placeholder="Paste ImgBB URL or Base64...">
                        <input type="file" id="bannerFile" accept="image/*" style="display: none;" onchange="convertToBase64(this, 'bannerValue')">
                        <button class="file-btn" onclick="document.getElementById('bannerFile').click()"><i class="fas fa-image"></i> Select</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Logo Image (URL or Select File) *</label>
                    <div class="image-upload-wrapper">
                        <input type="text" id="logoValue" placeholder="Paste ImgBB URL or Base64...">
                        <input type="file" id="logoFile" accept="image/*" style="display: none;" onchange="convertToBase64(this, 'logoValue')">
                        <button class="file-btn" onclick="document.getElementById('logoFile').click()"><i class="fas fa-image"></i> Select</button>
                    </div>
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Security Password</label>
                    <input type="text" id="password" placeholder="Leave empty if none">
                </div>
                <div class="input-group">
                    <label>Password Video Tutorial (URL)</label>
                    <input type="url" id="videoUrl" placeholder="YouTube link for password guide">
                </div>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <label>Screenshots (One URL per line)</label>
                    <textarea id="screenshotsInput" rows="3" placeholder="https://imgbb.com/img1&#10;https://imgbb.com/img2"></textarea>
                </div>
                <div class="input-group">
                    <label>Extra Links (One URL per line)</label>
                    <textarea id="extraLinksInput" rows="3" placeholder="https://link1.com&#10;https://link2.com"></textarea>
                </div>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea id="description" rows="4" placeholder="Features, how to use, etc..."></textarea>
            </div>

            <button class="btn-submit" id="submitBtn" onclick="saveApp()"><i class="fas fa-save"></i> PUBLISH TO STORE</button>
            <button class="btn-submit" id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#555; margin-top:10px; color:#fff;">CANCEL EDIT</button>
        </div>

        <div class="form-card">
            <h2><i class="fas fa-list"></i> Uploaded Apps / Mods</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appsTableBody">
                        <tr><td colspan="6" style="text-align: center;">Loading apps...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Check Security Token
        if(sessionStorage.getItem('mvx_admin_token') !== 'SECURE_AUTHORIZED') {
            window.location.href = 'admin.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const DB_PATH = "MVX_VIP_SERVER_V5";

        let allAppsData = {};
        let editId = null;

        // Base64 Converter for Dual Method
        function convertToBase64(input, targetId) {
            const file = input.files[0];
            if(file) {
                if(file.size > 2 * 1024 * 1024) {
                    showGlobalToast("File size must be under 2MB!", "error");
                    input.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(targetId).value = e.target.result;
                    showGlobalToast("Image Converted to Base64!", "success");
                };
                reader.readAsDataURL(file);
            }
        }

        function logout() {
            sessionStorage.removeItem('mvx_admin_token');
            window.location.href = 'admin.html';
        }

        // Fetch Data
        database.ref(DB_PATH).on('value', (snap) => {
            allAppsData = snap.val() || {};
            renderTable();
        });

        function renderTable() {
            const tbody = document.getElementById('appsTableBody');
            tbody.innerHTML = '';
            
            const keys = Object.keys(allAppsData);
            if(keys.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No apps found in database.</td></tr>`;
                return;
            }

            keys.reverse().forEach(id => {
                const app = allAppsData[id];
                const isHidden = app.isHidden ? '<span style="color:var(--danger); font-weight:bold;">Hidden</span>' : '<span style="color:var(--primary);">Active</span>';
                const eyeIcon = app.isHidden ? 'fa-eye' : 'fa-eye-slash';
                
                tbody.innerHTML += `
                    <tr style="${app.isHidden ? 'opacity:0.6;' : ''}">
                        <td><img src="${app.logoBase64 || 'https://via.placeholder.com/40'}" alt="logo"></td>
                        <td><b>${app.appName}</b><br><small>${app.version || 'v1.0'}</small></td>
                        <td>${app.gameCategory}</td>
                        <td><span style="background:#333; padding:3px 8px; border-radius:4px;">${app.accessType}</span></td>
                        <td>${isHidden}</td>
                        <td class="action-btns">
                            <button class="btn-edit" onclick="editApp('${id}')" title="Edit App"><i class="fas fa-edit"></i></button>
                            <button class="btn-hide" onclick="toggleVisibility('${id}', ${app.isHidden})" title="Hide/Unhide"><i class="fas ${eyeIcon}"></i></button>
                            <button class="btn-del" onclick="deleteApp('${id}')" title="Delete Permanently"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        // Save / Update logic (RESTORING ALL OLD FIELDS)
        function saveApp() {
            const btn = document.getElementById('submitBtn');
            const isUpdateChecked = document.getElementById('isAppUpdate').checked;

            // Parsing Screenshots and Extra Links from Textareas
            const screenshotsArray = document.getElementById('screenshotsInput').value.split('\n').map(s => s.trim()).filter(s => s !== '');
            const linksArray = document.getElementById('extraLinksInput').value.split('\n').map(l => l.trim()).filter(l => l !== '');

            const appData = {
                appName: document.getElementById('appName').value.trim(),
                category: document.getElementById('category').value,
                accessType: document.getElementById('accessType').value,
                version: document.getElementById('version').value.trim(),
                size: document.getElementById('size').value.trim(),
                bannerBase64: document.getElementById('bannerValue').value.trim(),
                logoBase64: document.getElementById('logoValue').value.trim(),
                screenshots: screenshotsArray,
                downloadUrl: document.getElementById('downloadUrl').value.trim(),
                password: document.getElementById('password').value.trim(),
                passwordVideoUrl: document.getElementById('videoUrl').value.trim(),
                description: document.getElementById('description').value.trim(),
                extraLinks: linksArray
            };

            if(!appData.appName || !appData.bannerBase64 || !appData.logoBase64 || !appData.downloadUrl) {
                return showGlobalToast("Please fill all required fields (*)", "error");
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SAVING...';

            // Handle Timing and Update Logic
            if(editId && allAppsData[editId]) {
                appData.isHidden = allAppsData[editId].isHidden || false;
                
                if (isUpdateChecked) {
                    appData.timestamp = Date.now();
                    appData.isUpdated = true;
                } else {
                    appData.timestamp = allAppsData[editId].timestamp || Date.now();
                    appData.isUpdated = allAppsData[editId].isUpdated || false;
                }
            } else {
                appData.isHidden = false;
                appData.timestamp = Date.now();
                appData.isUpdated = true;
            }

            const dbRef = editId ? database.ref(`${DB_PATH}/${editId}`) : database.ref(DB_PATH).push();

            dbRef.set(appData)
                .then(() => {
                    showGlobalToast(`App ${editId ? 'Updated' : 'Uploaded'} Successfully!`, "success");
                    cancelEdit();
                })
                .catch(error => {
                    showGlobalToast('Failed: ' + error.message, 'error');
                })
                .finally(() => {
                    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE';
                    btn.disabled = false;
                });
        }

        // Edit Mode
        function editApp(id) {
            const app = allAppsData[id];
            if(!app) return;

            editId = id;
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> Edit / Update App';
            
            document.getElementById('updateGroup').style.display = 'flex';
            document.getElementById('isAppUpdate').checked = false;

            document.getElementById('appName').value = app.appName || '';
            document.getElementById('category').value = app.gameCategory || app.category || 'Free Fire';
            document.getElementById('accessType').value = app.accessType || 'Free';
            document.getElementById('version').value = app.version || '';
            document.getElementById('size').value = app.size || '';
            document.getElementById('bannerValue').value = app.bannerBase64 || '';
            document.getElementById('logoValue').value = app.logoBase64 || '';
            document.getElementById('downloadUrl').value = app.downloadUrl || '';
            document.getElementById('password').value = app.password || '';
            document.getElementById('videoUrl').value = app.passwordVideoUrl || '';
            document.getElementById('description').value = app.description || '';
            
            // Restoring array data into Textareas
            document.getElementById('screenshotsInput').value = app.screenshots ? app.screenshots.join('\n') : '';
            document.getElementById('extraLinksInput').value = app.extraLinks ? app.extraLinks.join('\n') : '';

            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> UPDATE APP DATA';
            document.getElementById('cancelBtn').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function cancelEdit() {
            editId = null;
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload New App';
            document.getElementById('updateGroup').style.display = 'none';
            
            document.getElementById('appName').value = '';
            document.getElementById('version').value = '';
            document.getElementById('size').value = '';
            document.getElementById('bannerValue').value = '';
            document.getElementById('logoValue').value = '';
            document.getElementById('downloadUrl').value = '';
            document.getElementById('password').value = '';
            document.getElementById('videoUrl').value = '';
            document.getElementById('description').value = '';
            document.getElementById('screenshotsInput').value = '';
            document.getElementById('extraLinksInput').value = '';
            
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // Delete & Hide
        function deleteApp(id) {
            showConfirmModal("Are you sure you want to permanently delete this app?", () => {
                database.ref(`${DB_PATH}/${id}`).remove()
                .then(() => showGlobalToast("App deleted successfully!", "success"));
            });
        }

        function toggleVisibility(id, currentStatus) {
            database.ref(`${DB_PATH}/${id}/isHidden`).set(!currentStatus);
        }
    </script>
</body>
</html>
