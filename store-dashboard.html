<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>STORE ADMIN DASHBOARD | MVX SYSTEM v4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX STORE ADMIN DASHBOARD V4.0 (PREMIUM UI & REAL LOGIC)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        html, body { max-width: 100vw; overflow-x: hidden; }

        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --warning: #ffd700;
            --bg-void: #000000; --bg-card: #0c101a; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.8); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --font-head: 'Orbitron', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); padding-bottom: 50px; }
        
        .navbar { position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: blur(10px); border-bottom: var(--glass-border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; width: 100%; }
        .brand { font-family: var(--font-head); font-size: 1.5rem; color: var(--primary); }
        .nav-btns button { background: var(--danger); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btns button:hover { opacity: 0.8; }

        .container { width: 100%; max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; gap: 30px; grid-template-columns: 1fr; }

        .card { background: var(--bg-card); border: var(--glass-border); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 100%; overflow: hidden; }
        
        .card-title { font-family: var(--font-head); color: var(--primary); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; width: 100%; }
        
        #formTitleText { flex: 1; min-width: 0; word-break: break-word; line-height: 1.4; display: block; }

        /* --- PREMIUM UPLOAD METHOD SELECTOR UI --- */
        .upload-engine-box {
            background: rgba(0, 230, 184, 0.05);
            border: 1px solid rgba(0, 230, 184, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .upload-engine-box:hover {
            border-color: var(--primary);
            background: rgba(0, 230, 184, 0.1);
        }
        .upload-engine-icon { font-size: 2.5rem; color: var(--primary); text-shadow: 0 0 15px var(--primary-dim); }
        .upload-engine-info { flex: 1; }
        .upload-engine-info h4 { color: var(--text-primary); margin-bottom: 5px; font-family: var(--font-head); letter-spacing: 1px; font-size: 1.1rem; }
        .upload-engine-info p { color: var(--text-muted); font-size: 0.85rem; margin: 0; line-height: 1.4; }
        .upload-engine-select {
            background: var(--bg-input); border: 2px solid var(--primary); color: var(--primary);
            padding: 12px 15px; border-radius: 8px; font-weight: bold; outline: none;
            cursor: pointer; font-family: var(--font-body); font-size: 1rem; transition: 0.3s;
        }
        .upload-engine-select:focus { box-shadow: 0 0 15px var(--primary-dim); }
        .upload-engine-select option { background: var(--bg-card); color: #fff; font-weight: bold; }

        .form-grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 15px; width: 100%; }
        .form-grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; width: 100%; }
        
        .form-group { display: flex; flex-direction: column; width: 100%; max-width: 100%; }
        label { margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        input, select, textarea { width: 100%; max-width: 100%; height: 45px; background: var(--bg-input); border: 1px solid #333; color: #fff; padding: 0 15px; border-radius: 8px; font-family: var(--font-body); outline: none; transition: 0.3s; font-size: 16px !important; box-sizing: border-box; }
        textarea { height: auto; min-height: 100px; padding: 15px; resize: vertical; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        ::placeholder { color: #64748b; opacity: 1; }

        .img-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; width: 100%; }
        .img-upload-box { background: var(--bg-input); border: 2px dashed #333; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; height: 150px; display: flex; flex-direction: column; justify-content: center; }
        .img-upload-box:hover { border-color: var(--primary); }
        .img-upload-box img { max-width: 100%; max-height: 100%; border-radius: 8px; display: none; margin: 0 auto; object-fit: contain; }
        .img-upload-box .placeholder { color: var(--text-muted); font-size: 0.9rem; }
        .img-upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .preview-list { display: flex; gap: 10px; overflow-x: auto; margin-top: 10px; padding-bottom: 10px; width: 100%; }
        .preview-item { position: relative; width: 80px; height: 120px; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--primary); }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }

        .extra-link-row { display: grid; grid-template-columns: 1fr 2fr auto; gap: 10px; margin-bottom: 10px; width: 100%; }
        .btn-add-link { background: var(--primary-dim); border: 1px dashed var(--primary); color: var(--primary); width: 100%; height: 45px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .btn-submit { width: 100%; height: 55px; background: var(--primary); color: #000; font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; text-align: left; background: var(--bg-input); }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; white-space: nowrap; }
        th { background: rgba(0,0,0,0.5); color: var(--primary); font-family: var(--font-head); font-size: 0.9rem; }
        td { font-size: 0.95rem; }
        
        .app-title-wrapper { display: flex; align-items: center; gap: 10px; max-width: 250px; }
        .app-title-wrapper img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid #333; background: var(--bg-card); }
        .app-title-text { font-weight: bold; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; width: 100%; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-active { background: rgba(0, 230, 184, 0.2); color: var(--primary); }
        .status-hidden { background: rgba(255, 0, 60, 0.2); color: var(--danger); }

        .action-btns { display: flex; gap: 8px; }
        .act-btn { width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer; color: #fff; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .act-edit { background: var(--primary); color: #000; }
        .act-hide { background: var(--warning); color: #000; }
        .act-del { background: var(--danger); }
        .act-btn:hover { transform: scale(1.1); }

        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-input); border-left: 4px solid var(--primary); padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; color: #fff; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        @media (max-width: 768px) {
            .navbar { padding: 10px 15px; }
            .brand { font-size: 1.1rem; }
            .nav-btns button { padding: 6px 10px; font-size: 0.8rem; margin-right: 5px !important; }
            .container { margin: 15px auto; padding: 0 10px; gap: 20px; }
            .card { padding: 15px; border-radius: 12px; }
            
            .upload-engine-box { flex-direction: column; align-items: flex-start; gap: 15px; padding: 15px; }
            .upload-engine-icon { display: none; }
            .upload-engine-select { width: 100%; }

            .form-grid-2, .form-grid-3, .img-grid { grid-template-columns: 1fr; }
            .extra-link-row { display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid #333; }
            .card-title { font-size: 1.1rem; flex-direction: column; align-items: flex-start; gap: 10px; }
            #cancelEditBtn { width: 100%; padding: 12px; font-size: 1rem; }
            table, thead, tbody, tr, td { display: block; width: 100%; }
            thead { display: none; }
            tr { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; margin-bottom: 15px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.1); padding: 8px 0; white-space: normal; text-align: right; font-size: 0.9rem; }
            td::before { content: attr(data-label); color: var(--text-muted); font-family: var(--font-head); font-size: 0.85rem; font-weight: bold; text-align: left; flex-shrink: 0; }
            .action-btns { justify-content: flex-end; }
            .app-title-wrapper { justify-content: flex-end; }
            .app-title-text { max-width: 140px; text-align: right; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand"><i class="fas fa-satellite-dish"></i> STORE ADMIN</div>
        <div class="nav-btns">
            <button onclick="window.location.href='index.html'" style="background: var(--bg-input); border: 1px solid #333; margin-right: 10px;"><i class="fas fa-home"></i> STORE</button>
            <button onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        
        <div class="card" id="formCard">
            <h2 class="card-title">
                <span id="formTitleText"><i class="fas fa-upload"></i> UPLOAD NEW APP</span>
                <button id="cancelEditBtn" style="display:none; background:var(--danger); color:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel Edit</button>
            </h2>

            <div class="upload-engine-box">
                <i class="fas fa-server upload-engine-icon"></i>
                <div class="upload-engine-info">
                    <h4>IMAGE UPLOAD ENGINE</h4>
                    <p>Select the method for <strong style="color:var(--primary)">ALL</strong> image uploads below.</p>
                </div>
                <select id="uploadMethod" class="upload-engine-select">
                    <option value="imgbb">⚡ ImgBB API (Fast - New Method)</option>
                    <option value="base64">💾 Base64 (Legacy - Old Method)</option>
                </select>
            </div>
            
            <form id="uploadForm" onsubmit="submitApp(event)">
                <input type="hidden" id="editAppId" value="">

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>App / Game Name *</label>
                        <input type="text" id="appName" required placeholder="Enter App Name">
                    </div>
                    <div class="form-group">
                        <label>Version</label>
                        <input type="text" id="version" placeholder="Enter Version">
                    </div>
                </div>

                <div class="form-grid-3">
                    <div class="form-group">
                        <label>Size</label>
                        <input type="text" id="size" placeholder="Enter File Size">
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="Free Fire">Free Fire</option>
                            <option value="PUBG">PUBG</option>
                            <option value="Blood Strike">Blood Strike</option>
                            <option value="Tools">Tools</option>
                            <option value="Other Game">Others</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Access Type *</label>
                        <select id="accessType" required>
                            <option value="Free">Free</option>
                            <option value="Premium">Premium</option>
                            <option value="Paid">Paid</option>
                        </select>
                    </div>
                </div>

                <h3 style="margin: 20px 0 10px; color: var(--primary); font-size: 1rem;">MEDIA UPLOADS</h3>
                <div class="img-grid">
                    <div class="form-group">
                        <label>Thumbnail / Banner (16:9) *</label>
                        <div class="img-upload-box">
                            <div class="placeholder" id="bannerText"><i class="fas fa-image fa-2x"></i><br>Select Banner</div>
                            <img id="bannerPreview">
                            <input type="file" accept="image/*" id="bannerInput" onchange="processImage(this, 'bannerPreview', 'bannerText', 'bannerValue')">
                            <input type="hidden" id="bannerValue" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>App Logo (1:1) *</label>
                        <div class="img-upload-box">
                            <div class="placeholder" id="logoText"><i class="fas fa-icons fa-2x"></i><br>Select Logo</div>
                            <img id="logoPreview">
                            <input type="file" accept="image/*" id="logoInput" onchange="processImage(this, 'logoPreview', 'logoText', 'logoValue')">
                            <input type="hidden" id="logoValue" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Preview Screenshots (Max 5 Images)</label>
                    <div class="img-upload-box" style="height: auto; padding: 10px;">
                        <span style="color: var(--text-muted);"><i class="fas fa-images"></i> Click to add screenshots</span>
                        <input type="file" accept="image/*" multiple onchange="processMultipleImages(this)">
                    </div>
                    <div class="preview-list" id="screenshotContainer"></div>
                </div>

                <h3 style="margin: 20px 0 10px; color: var(--primary); font-size: 1rem;">DOWNLOAD & SECURITY</h3>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Direct Download Link *</label>
                    <input type="url" id="downloadUrl" required placeholder="Paste Download Link Here">
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Password (Leave empty if none)</label>
                        <input type="text" id="password" placeholder="Enter Password">
                    </div>
                    <div class="form-group">
                        <label>Password Video URL (YouTube)</label>
                        <input type="url" id="videoUrl" placeholder="Paste YouTube Link">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Extra Links</label>
                    <div id="extraLinksContainer"></div>
                    <button type="button" class="btn-add-link" onclick="addExtraLink()"><i class="fas fa-plus"></i> Add Extra Link</button>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Write app features..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn"><i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE</button>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title"><i class="fas fa-server"></i> MANAGE UPLOADED APPS</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>App / Logo</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appTableBody">
                        <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        if (sessionStorage.getItem('mvx_admin_token') !== 'SECURE_AUTHORIZED') {
            window.location.href = 'admin.html';
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const DB_PATH = "MVX_VIP_SERVER_V5";
        const IMGBB_API_KEY = "820eb9aa6a57f863045a52c1929efc9c";

        let screenshotsArray = [];
        let allAppsData = {};

        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--primary)'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function logoutAdmin() {
            sessionStorage.removeItem('mvx_admin_token');
            window.location.href = 'admin.html';
        }

        function loadApps() {
            database.ref(DB_PATH).on('value', snap => {
                allAppsData = snap.val() || {};
                const tbody = document.getElementById('appTableBody');
                tbody.innerHTML = '';
                const keys = Object.keys(allAppsData).reverse();
                if(keys.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No apps uploaded yet.</td></tr>`;
                    return;
                }
                let tableHTML = '';
                keys.forEach(id => {
                    const app = allAppsData[id];
                    const isHidden = app.isHidden || false;
                    tableHTML += `
                        <tr>
                            <td data-label="App Name">
                                <div class="app-title-wrapper">
                                    <img src="${app.logoBase64}" alt="Logo">
                                    <span class="app-title-text">${app.appName}</span>
                                </div>
                            </td>
                            <td data-label="Category">${app.gameCategory}</td>
                            <td data-label="Type">${app.accessType}</td>
                            <td data-label="Status">
                                <span class="status-badge ${isHidden ? 'status-hidden' : 'status-active'}">${isHidden ? 'Hidden' : 'Active'}</span>
                            </td>
                            <td data-label="Actions">
                                <div class="action-btns">
                                    <button class="act-btn act-edit" onclick="loadEditData('${id}')"><i class="fas fa-edit"></i></button>
                                    <button class="act-btn act-hide" onclick="toggleHide('${id}', ${isHidden})"><i class="fas ${isHidden ? 'fa-eye' : 'fa-eye-slash'}"></i></button>
                                    <button class="act-btn act-del" onclick="deleteApp('${id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>`;
                });
                tbody.innerHTML = tableHTML;
            });
        }
        loadApps();

        // --- CORE LOGIC: PROCESS IMAGE BASED ON SELECTED METHOD ---
        async function processImage(input, previewId, textId, hiddenInputId) {
            const file = input.files[0];
            if (!file) return;

            const method = document.getElementById('uploadMethod').value;
            const textEl = document.getElementById(textId);
            const previewEl = document.getElementById(previewId);
            const hiddenEl = document.getElementById(hiddenInputId);

            textEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            if (method === 'imgbb') {
                const formData = new FormData();
                formData.append('image', file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.success) {
                        hiddenEl.value = data.data.url;
                        previewEl.src = data.data.url;
                        previewEl.style.display = 'block';
                        textEl.style.display = 'none';
                    } else {
                        showToast('ImgBB API Error!', 'error');
                        textEl.innerHTML = '<i class="fas fa-image fa-2x"></i><br>Select Image';
                    }
                } catch (e) { 
                    showToast('Upload Failed!', 'error'); 
                    textEl.innerHTML = '<i class="fas fa-image fa-2x"></i><br>Select Image';
                }
            } else {
                // Legacy Base64 Method
                const reader = new FileReader();
                reader.onload = (e) => {
                    hiddenEl.value = e.target.result;
                    previewEl.src = e.target.result;
                    previewEl.style.display = 'block';
                    textEl.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        async function processMultipleImages(input) {
            const files = input.files;
            if (screenshotsArray.length + files.length > 5) return showToast("Max 5 screenshots!", "error");
            
            const method = document.getElementById('uploadMethod').value;
            showToast("Processing Screenshots...", "success");

            for (let file of files) {
                if (method === 'imgbb') {
                    const formData = new FormData();
                    formData.append('image', file);
                    try {
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                        const data = await res.json();
                        if (data.success) screenshotsArray.push(data.data.url);
                    } catch (e) {}
                } else {
                    const reader = new FileReader();
                    const b64 = await new Promise(r => { reader.onload = e => r(e.target.result); reader.readAsDataURL(file); });
                    screenshotsArray.push(b64);
                }
            }
            renderScreenshots();
            input.value = '';
        }

        function renderScreenshots() {
            const container = document.getElementById('screenshotContainer');
            container.innerHTML = screenshotsArray.map((src, i) => `
                <div class="preview-item">
                    <img src="${src}">
                    <button type="button" class="remove-btn" onclick="removeScreenshot(${i})">×</button>
                </div>`).join('');
        }

        function removeScreenshot(i) { screenshotsArray.splice(i, 1); renderScreenshots(); }

        function addExtraLink(t='', u='') {
            const div = document.createElement('div');
            div.className = 'extra-link-row';
            div.innerHTML = `
                <input type="text" placeholder="Title" class="ex-title" value="${t}" required>
                <input type="url" placeholder="URL" class="ex-url" value="${u}" required>
                <button type="button" onclick="this.parentElement.remove()" style="background:var(--danger); border:none; color:#fff; padding:5px 10px; border-radius:5px;"><i class="fas fa-trash"></i></button>`;
            document.getElementById('extraLinksContainer').appendChild(div);
        }

        function toggleHide(id, status) { database.ref(`${DB_PATH}/${id}/isHidden`).set(!status); }
        function deleteApp(id) { if(confirm("Permanently Delete App?")) database.ref(`${DB_PATH}/${id}`).remove(); }

        function loadEditData(id) {
            const app = allAppsData[id];
            document.getElementById('editAppId').value = id;
            document.getElementById('formTitleText').innerText = "EDITING: " + app.appName;
            document.getElementById('cancelEditBtn').style.display = 'block';
            document.getElementById('appName').value = app.appName;
            document.getElementById('category').value = app.gameCategory;
            document.getElementById('accessType').value = app.accessType;
            document.getElementById('version').value = app.version || '';
            document.getElementById('size').value = app.size || '';
            document.getElementById('downloadUrl').value = app.downloadUrl;
            document.getElementById('password').value = app.password || '';
            document.getElementById('videoUrl').value = app.passwordVideoUrl || '';
            document.getElementById('description').value = app.description || '';
            
            document.getElementById('bannerValue').value = app.bannerBase64;
            document.getElementById('bannerPreview').src = app.bannerBase64;
            document.getElementById('bannerPreview').style.display = 'block';
            document.getElementById('bannerText').style.display = 'none';

            document.getElementById('logoValue').value = app.logoBase64;
            document.getElementById('logoPreview').src = app.logoBase64;
            document.getElementById('logoPreview').style.display = 'block';
            document.getElementById('logoText').style.display = 'none';

            screenshotsArray = app.screenshots || [];
            renderScreenshots();
            document.getElementById('extraLinksContainer').innerHTML = '';
            if(app.extraLinks) app.extraLinks.forEach(l => addExtraLink(l.title, l.url));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editAppId').value = '';
            document.getElementById('formTitleText').innerHTML = `<i class="fas fa-upload"></i> UPLOAD NEW APP`;
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('bannerPreview').style.display = 'none';
            document.getElementById('bannerText').style.display = 'block';
            document.getElementById('logoPreview').style.display = 'none';
            document.getElementById('logoText').style.display = 'block';
            screenshotsArray = [];
            renderScreenshots();
            document.getElementById('extraLinksContainer').innerHTML = '';
        }

        function submitApp(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const id = document.getElementById('editAppId').value;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';

            const links = [];
            document.querySelectorAll('.extra-link-row').forEach(r => links.push({ title: r.querySelector('.ex-title').value, url: r.querySelector('.ex-url').value }));

            const data = {
                appName: document.getElementById('appName').value,
                gameCategory: document.getElementById('category').value,
                accessType: document.getElementById('accessType').value,
                version: document.getElementById('version').value,
                size: document.getElementById('size').value,
                bannerBase64: document.getElementById('bannerValue').value,
                logoBase64: document.getElementById('logoValue').value,
                screenshots: screenshotsArray,
                downloadUrl: document.getElementById('downloadUrl').value,
                password: document.getElementById('password').value,
                passwordVideoUrl: document.getElementById('videoUrl').value,
                description: document.getElementById('description').value,
                extraLinks: links,
                timestamp: Date.now(),
                isHidden: id ? (allAppsData[id].isHidden || false) : false
            };

            const ref = id ? database.ref(`${DB_PATH}/${id}`) : database.ref(DB_PATH).push();
            ref.set(data).then(() => {
                showToast("Success!");
                cancelEdit();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE';
            }).catch(error => {
                showToast("Error: " + error.message, "error");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE';
            });
        }
    </script>
</body>
</html>
