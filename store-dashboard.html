<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>STORE ADMIN DASHBOARD | MVX SYSTEM v4.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* ==========================================================================
           MVX STORE ADMIN DASHBOARD V4.0 (MOBILE FIXED)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        
        /* ডানে-বামে স্ক্রল পুরোপুরি বন্ধ করার জন্য */
        html, body { max-width: 100vw; overflow-x: hidden; }

        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --danger: #ff003c; --warning: #ffd700;
            --bg-void: #000000; --bg-card: #0c101a; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.8); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --font-head: 'Orbitron', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); padding-bottom: 50px; }
        
        /* Navbar */
        .navbar { position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: blur(10px); border-bottom: var(--glass-border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; width: 100%; }
        .brand { font-family: var(--font-head); font-size: 1.5rem; color: var(--primary); }
        .nav-btns button { background: var(--danger); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-btns button:hover { opacity: 0.8; }

        /* Container */
        .container { width: 100%; max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; gap: 30px; grid-template-columns: 1fr; }

        /* Card Setup */
        .card { background: var(--bg-card); border: var(--glass-border); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; }
        .card-title { font-family: var(--font-head); color: var(--primary); margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* Form Layout */
        .form-grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .form-grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        .form-group { display: flex; flex-direction: column; width: 100%; }
        label { margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        input, select, textarea { width: 100%; height: 45px; background: var(--bg-input); border: 1px solid #333; color: #fff; padding: 0 15px; border-radius: 8px; font-family: var(--font-body); outline: none; transition: 0.3s; font-size: 16px !important; }
        textarea { height: auto; min-height: 100px; padding: 15px; resize: vertical; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }

        /* Image Upload Grid */
        .img-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; width: 100%; }
        .img-upload-box { background: var(--bg-input); border: 2px dashed #333; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; height: 150px; display: flex; flex-direction: column; justify-content: center; }
        .img-upload-box:hover { border-color: var(--primary); }
        .img-upload-box img { max-width: 100%; max-height: 100%; border-radius: 8px; display: none; margin: 0 auto; object-fit: contain; }
        .img-upload-box .placeholder { color: var(--text-muted); font-size: 0.9rem; }
        .img-upload-box input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* Previews Section */
        .preview-list { display: flex; gap: 10px; overflow-x: auto; margin-top: 10px; padding-bottom: 10px; width: 100%; }
        .preview-item { position: relative; width: 80px; height: 120px; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--primary); }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-item .remove-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* Extra Links */
        .extra-link-row { display: grid; grid-template-columns: 1fr 2fr auto; gap: 10px; margin-bottom: 10px; width: 100%; }
        .btn-add-link { background: var(--primary-dim); border: 1px dashed var(--primary); color: var(--primary); width: 100%; height: 45px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Submit Button */
        .btn-submit { width: 100%; height: 55px; background: var(--primary); color: #000; font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-submit:hover { box-shadow: 0 0 20px var(--primary-dim); transform: translateY(-2px); }

        /* App Management Table (Desktop View) */
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; text-align: left; background: var(--bg-input); }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; white-space: nowrap; }
        th { background: rgba(0,0,0,0.5); color: var(--primary); font-family: var(--font-head); font-size: 0.9rem; }
        td { font-size: 0.95rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-active { background: rgba(0, 230, 184, 0.2); color: var(--primary); }
        .status-hidden { background: rgba(255, 0, 60, 0.2); color: var(--danger); }

        .action-btns { display: flex; gap: 8px; }
        .act-btn { width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer; color: #fff; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .act-edit { background: var(--primary); color: #000; }
        .act-hide { background: var(--warning); color: #000; }
        .act-del { background: var(--danger); }
        .act-btn:hover { transform: scale(1.1); }

        /* Toast */
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; }
        .toast { background: var(--bg-input); border-left: 4px solid var(--primary); padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; display: flex; gap: 10px; align-items: center; color: #fff; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* ==========================================================================
           মোবাইলের জন্য স্পেশাল রেসপন্সিভ (Table to Card Fix)
           ========================================================================== */
        @media (max-width: 768px) {
            .navbar { padding: 10px 15px; }
            .brand { font-size: 1.1rem; }
            .nav-btns button { padding: 6px 10px; font-size: 0.8rem; margin-right: 5px !important; }
            .container { margin: 15px auto; padding: 0 10px; gap: 20px; }
            .card { padding: 15px; border-radius: 12px; }
            
            .form-grid-2, .form-grid-3, .img-grid { grid-template-columns: 1fr; }
            
            .extra-link-row { display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid #333; }
            .extra-link-row button { width: 100%; height: 40px; margin-top: 5px; }
            .btn-submit { height: 50px; font-size: 1.1rem; }
            .card-title { font-size: 1.2rem; flex-direction: column; align-items: flex-start; gap: 10px; }
            #cancelEditBtn { width: 100%; padding: 10px; }

            /* টেবিল ফিক্স: মোবাইলে টেবিলকে কার্ড বানিয়ে দেওয়া হলো যেন ডানে-বামে সরাতে না হয় */
            .table-responsive { border: none; background: transparent; overflow: hidden; }
            table, thead, tbody, tr, td { display: block; width: 100%; }
            thead { display: none; /* মোবাইলে হেডিং হাইড করা হলো */ }
            tr { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 12px; margin-bottom: 15px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.1); padding: 8px 0; white-space: normal; text-align: right; font-size: 0.9rem; }
            td:last-child { border-bottom: none; padding-bottom: 0; }
            
            /* CSS দিয়ে লেবেল যুক্ত করা হলো */
            td::before { content: attr(data-label); color: var(--text-muted); font-family: var(--font-head); font-size: 0.85rem; font-weight: bold; text-align: left; padding-right: 15px; flex-shrink: 0; }
            .action-btns { justify-content: flex-end; width: auto; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="brand"><i class="fas fa-satellite-dish"></i> STORE ADMIN</div>
        <div class="nav-btns">
            <button onclick="window.location.href='index.html'" style="background: var(--bg-input); border: 1px solid #333; margin-right: 10px;"><i class="fas fa-home"></i> STORE</button>
            <button onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        
        <div class="card" id="formCard">
            <h2 class="card-title">
                <span id="formTitleText"><i class="fas fa-upload"></i> UPLOAD NEW APP</span>
                <button id="cancelEditBtn" style="display:none; background:var(--danger); color:#fff; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="cancelEdit()">Cancel Edit</button>
            </h2>
            
            <form id="uploadForm" onsubmit="submitApp(event)">
                <input type="hidden" id="editAppId" value="">

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>App / Game Name *</label>
                        <input type="text" id="appName" required placeholder="e.g. Free Fire Mod VIP">
                    </div>
                    <div class="form-group">
                        <label>Version</label>
                        <input type="text" id="version" placeholder="e.g. v1.100.1">
                    </div>
                </div>

                <div class="form-grid-3">
                    <div class="form-group">
                        <label>Size</label>
                        <input type="text" id="size" placeholder="e.g. 150 MB">
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="Free Fire">Free Fire</option>
                            <option value="PUBG">PUBG</option>
                            <option value="Blood Strike">Blood Strike</option>
                            <option value="Tools">Tools</option>
                            <option value="Other Game">Others</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Access Type *</label>
                        <select id="accessType" required>
                            <option value="Free">Free</option>
                            <option value="Premium">Premium</option>
                            <option value="Paid">Paid</option>
                        </select>
                    </div>
                </div>

                <h3 style="margin: 20px 0 10px; color: var(--primary); font-size: 1rem;">MEDIA UPLOADS (BASE64)</h3>
                <div class="img-grid">
                    <div class="form-group">
                        <label>Thumbnail / Banner (16:9) *</label>
                        <div class="img-upload-box">
                            <div class="placeholder" id="bannerText"><i class="fas fa-image fa-2x"></i><br>Select Banner</div>
                            <img id="bannerPreview">
                            <input type="file" accept="image/*" id="bannerInput" onchange="convertToBase64(this, 'bannerPreview', 'bannerText', 'bannerBase64')">
                            <input type="hidden" id="bannerBase64" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>App Logo (1:1) *</label>
                        <div class="img-upload-box">
                            <div class="placeholder" id="logoText"><i class="fas fa-icons fa-2x"></i><br>Select Logo</div>
                            <img id="logoPreview">
                            <input type="file" accept="image/*" id="logoInput" onchange="convertToBase64(this, 'logoPreview', 'logoText', 'logoBase64')">
                            <input type="hidden" id="logoBase64" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Preview Screenshots (Max 5 Images)</label>
                    <div class="img-upload-box" style="height: auto; padding: 10px;">
                        <span style="color: var(--text-muted);"><i class="fas fa-images"></i> Click to add screenshots</span>
                        <input type="file" accept="image/*" multiple onchange="handleMultipleScreenshots(this)">
                    </div>
                    <div class="preview-list" id="screenshotContainer"></div>
                </div>

                <h3 style="margin: 20px 0 10px; color: var(--primary); font-size: 1rem;">DOWNLOAD & SECURITY</h3>
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Direct Download Link (Mediafire/Drive) *</label>
                    <input type="url" id="downloadUrl" required placeholder="https://...">
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Password (Leave empty if none)</label>
                        <input type="text" id="password" placeholder="e.g. MVX123">
                    </div>
                    <div class="form-group">
                        <label>Password Video URL (YouTube)</label>
                        <input type="url" id="videoUrl" placeholder="https://youtube.com/...">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Extra Links (Telegram, YouTube, etc.)</label>
                    <div id="extraLinksContainer"></div>
                    <button type="button" class="btn-add-link" onclick="addExtraLink()"><i class="fas fa-plus"></i> Add Extra Link</button>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Write app features, mod menus, installation guide..."></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn"><i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE</button>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title"><i class="fas fa-server"></i> MANAGE UPLOADED APPS</h2>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>App Name</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appTableBody">
                        <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Security Check
        if (sessionStorage.getItem('mvx_admin_token') !== 'SECURE_AUTHORIZED') {
            window.location.href = 'admin.html';
        }

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();
        const DB_PATH = "MVX_VIP_SERVER_V5";

        let screenshotsArray = [];
        let allAppsData = {};

        function showToast(msg, type='success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'error' ? 'var(--danger)' : 'var(--primary)';
            toast.innerHTML = `<i class="fas fa-${type==='error'?'times':'check'}-circle" style="color:${type==='error'?'var(--danger)':'var(--primary)'}"></i> <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 3000);
        }

        function logoutAdmin() {
            sessionStorage.removeItem('mvx_admin_token');
            window.location.href = 'admin.html';
        }

        // --- Fetch & Display Apps ---
        function loadApps() {
            database.ref(DB_PATH).on('value', snap => {
                allAppsData = snap.val() || {};
                const tbody = document.getElementById('appTableBody');
                tbody.innerHTML = '';

                const keys = Object.keys(allAppsData).reverse();
                if(keys.length === 0) {
                    tbody.innerHTML = `<tr><td colspan=\"5\" style=\"text-align:center; color:var(--text-muted);\">No apps uploaded yet.</td></tr>`;
                    return;
                }

                keys.forEach(id => {
                    const app = allAppsData[id];
                    const isHidden = app.isHidden || false;
                    const statusBadge = isHidden 
                        ? `<span class="status-badge status-hidden">Hidden</span>` 
                        : `<span class="status-badge status-active">Active</span>`;
                    const hideIcon = isHidden ? "fa-eye" : "fa-eye-slash";
                    const hideTitle = isHidden ? "Unhide App" : "Hide App";

                    // JS এ data-label অ্যাড করা হয়েছে যেন মোবাইলে সুন্দরভাবে শো করে
                    tbody.innerHTML += `
                        <tr>
                            <td data-label="App Name" style="font-weight:bold; color:var(--primary);">${app.appName}</td>
                            <td data-label="Category">${app.gameCategory}</td>
                            <td data-label="Type">${app.accessType}</td>
                            <td data-label="Status">${statusBadge}</td>
                            <td data-label="Actions">
                                <div class="action-btns">
                                    <button type="button" class="act-btn act-edit" onclick="loadEditData('${id}')" title="Edit"><i class="fas fa-edit"></i></button>
                                    <button type="button" class="act-btn act-hide" onclick="toggleHide('${id}', ${isHidden})" title="${hideTitle}"><i class="fas ${hideIcon}"></i></button>
                                    <button type="button" class="act-btn act-del" onclick="deleteApp('${id}')" title="Delete"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            });
        }
        loadApps();

        // --- Image Convert Logic ---
        function convertToBase64(input, previewId, textId, hiddenInputId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;
                    document.getElementById(previewId).src = base64String;
                    document.getElementById(previewId).style.display = 'block';
                    document.getElementById(textId).style.display = 'none';
                    document.getElementById(hiddenInputId).value = base64String;
                };
                reader.readAsDataURL(file);
            }
        }

        function handleMultipleScreenshots(input) {
            const files = input.files;
            if (screenshotsArray.length + files.length > 5) {
                showToast("Maximum 5 screenshots allowed!", "error");
                return;
            }
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    screenshotsArray.push(e.target.result);
                    renderScreenshots();
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function renderScreenshots() {
            const container = document.getElementById('screenshotContainer');
            container.innerHTML = '';
            screenshotsArray.forEach((b64, index) => {
                container.innerHTML += `
                    <div class="preview-item">
                        <img src="${b64}">
                        <button type="button" class="remove-btn" onclick="removeScreenshot(${index})">×</button>
                    </div>
                `;
            });
        }

        function removeScreenshot(index) {
            screenshotsArray.splice(index, 1);
            renderScreenshots();
        }

        function addExtraLink(title='', url='') {
            const container = document.getElementById('extraLinksContainer');
            const div = document.createElement('div');
            div.className = 'extra-link-row';
            div.innerHTML = `
                <input type="text" placeholder="Title (e.g. Telegram)" class="ex-title" value="${title}" required>
                <input type="url" placeholder="URL Link" class="ex-url" value="${url}" required>
                <button type="button" onclick="this.parentElement.remove()" style="background:var(--danger); border:none; color:#fff; border-radius:8px; cursor:pointer;"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
        }

        // --- MANAGE APP ACTIONS ---
        function toggleHide(id, currentStatus) {
            database.ref(`${DB_PATH}/${id}/isHidden`).set(!currentStatus)
                .then(() => showToast(`App ${!currentStatus ? 'Hidden' : 'Visible'} Successfully!`))
                .catch(err => showToast("Error: " + err.message, "error"));
        }

        function deleteApp(id) {
            if(confirm("Are you sure you want to permanently delete this app?")) {
                database.ref(`${DB_PATH}/${id}`).remove()
                    .then(() => showToast("App Deleted Successfully!"))
                    .catch(err => showToast("Error: " + err.message, "error"));
            }
        }

        // --- EDIT LOGIC ---
        function loadEditData(id) {
            const app = allAppsData[id];
            if(!app) return;

            document.getElementById('editAppId').value = id;
            document.getElementById('formTitleText').innerHTML = `<i class="fas fa-edit"></i> EDITING: ${app.appName}`;
            document.getElementById('submitBtn').innerHTML = `<i class="fas fa-save"></i> UPDATE APP DATA`;
            document.getElementById('cancelEditBtn').style.display = 'inline-block';

            // Populate Text Fields
            document.getElementById('appName').value = app.appName;
            document.getElementById('version').value = app.version || '';
            document.getElementById('size').value = app.size || '';
            document.getElementById('category').value = app.gameCategory;
            document.getElementById('accessType').value = app.accessType;
            document.getElementById('downloadUrl').value = app.downloadUrl;
            document.getElementById('password').value = app.password || '';
            document.getElementById('videoUrl').value = app.passwordVideoUrl || '';
            document.getElementById('description').value = app.description || '';

            // Populate Banner
            document.getElementById('bannerBase64').value = app.bannerBase64;
            document.getElementById('bannerPreview').src = app.bannerBase64;
            document.getElementById('bannerPreview').style.display = 'block';
            document.getElementById('bannerText').style.display = 'none';
            document.getElementById('bannerInput').removeAttribute('required');

            // Populate Logo
            document.getElementById('logoBase64').value = app.logoBase64;
            document.getElementById('logoPreview').src = app.logoBase64;
            document.getElementById('logoPreview').style.display = 'block';
            document.getElementById('logoText').style.display = 'none';
            document.getElementById('logoInput').removeAttribute('required');

            // Populate Screenshots
            screenshotsArray = app.screenshots ? [...app.screenshots] : [];
            renderScreenshots();

            // Populate Extra Links
            document.getElementById('extraLinksContainer').innerHTML = '';
            if(app.extraLinks) {
                app.extraLinks.forEach(link => addExtraLink(link.title, link.url));
            }

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editAppId').value = '';
            document.getElementById('formTitleText').innerHTML = `<i class="fas fa-upload"></i> UPLOAD NEW APP`;
            document.getElementById('submitBtn').innerHTML = `<i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE`;
            document.getElementById('cancelEditBtn').style.display = 'none';

            // Reset Images
            document.getElementById('bannerPreview').style.display = 'none';
            document.getElementById('bannerText').style.display = 'block';
            document.getElementById('bannerBase64').value = '';
            document.getElementById('bannerInput').setAttribute('required', 'true');

            document.getElementById('logoPreview').style.display = 'none';
            document.getElementById('logoText').style.display = 'block';
            document.getElementById('logoBase64').value = '';
            document.getElementById('logoInput').setAttribute('required', 'true');

            screenshotsArray = [];
            renderScreenshots();
            document.getElementById('extraLinksContainer').innerHTML = '';
        }

        // --- SUBMIT (Upload / Update) ---
        function submitApp(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const editId = document.getElementById('editAppId').value;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';
            btn.disabled = true;

            let extraLinks = [];
            document.querySelectorAll('.extra-link-row').forEach(row => {
                extraLinks.push({
                    title: row.querySelector('.ex-title').value,
                    url: row.querySelector('.ex-url').value
                });
            });

            const appData = {
                appName: document.getElementById('appName').value,
                version: document.getElementById('version').value || 'v1.0',
                size: document.getElementById('size').value || 'N/A',
                gameCategory: document.getElementById('category').value,
                accessType: document.getElementById('accessType').value,
                bannerBase64: document.getElementById('bannerBase64').value,
                logoBase64: document.getElementById('logoBase64').value,
                screenshots: screenshotsArray,
                downloadUrl: document.getElementById('downloadUrl').value,
                password: document.getElementById('password').value,
                passwordVideoUrl: document.getElementById('videoUrl').value,
                description: document.getElementById('description').value,
                extraLinks: extraLinks,
                timestamp: Date.now()
            };

            // Maintain hidden status if updating
            if(editId && allAppsData[editId]) {
                appData.isHidden = allAppsData[editId].isHidden || false;
            } else {
                appData.isHidden = false;
            }

            const dbRef = editId ? database.ref(`${DB_PATH}/${editId}`) : database.ref(DB_PATH).push();

            dbRef.set(appData)
                .then(() => {
                    showToast(`App ${editId ? 'Updated' : 'Uploaded'} Successfully!`);
                    setTimeout(() => { cancelEdit(); btn.disabled = false; }, 1500);
                })
                .catch(error => {
                    showToast('Failed: ' + error.message, 'error');
                    btn.innerHTML = editId ? '<i class="fas fa-save"></i> UPDATE APP DATA' : '<i class="fas fa-cloud-upload-alt"></i> PUBLISH TO STORE';
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
