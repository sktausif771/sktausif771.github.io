<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | SYSTEM ERROR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00e676;
            --red: #ff0055;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            text-align: center;
        }

        /* --- GLITCH TEXT EFFECT --- */
        .glitch-container {
            position: relative;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            font-family: 'Rajdhani', sans-serif;
            color: white;
            position: relative;
            z-index: 1;
        }

        .error-code::before,
        .error-code::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        .error-code::before {
            left: 2px;
            text-shadow: -1px 0 var(--red);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .error-code::after {
            left: -2px;
            text-shadow: -1px 0 var(--primary);
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        /* --- TEXT CONTENT --- */
        .msg-title {
            font-size: 24px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .msg-desc {
            color: #888;
            font-size: 14px;
            max-width: 300px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* --- HOME BUTTON --- */
        .btn-home {
            padding: 12px 30px;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            font-family: 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-home:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        /* --- COUNTDOWN TIMER --- */
        .redirect-msg {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }

        /* --- ANIMATION KEYFRAMES --- */
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 30px, 0); transform: skew(0.6deg); }
            20% { clip: rect(50px, 9999px, 20px, 0); transform: skew(0.2deg); }
            40% { clip: rect(20px, 9999px, 80px, 0); transform: skew(0.1deg); }
            60% { clip: rect(80px, 9999px, 40px, 0); transform: skew(0.8deg); }
            80% { clip: rect(40px, 9999px, 10px, 0); transform: skew(0.3deg); }
            100% { clip: rect(70px, 9999px, 60px, 0); transform: skew(0.5deg); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(60px, 9999px, 10px, 0); transform: skew(0.7deg); }
            20% { clip: rect(20px, 9999px, 50px, 0); transform: skew(0.3deg); }
            40% { clip: rect(10px, 9999px, 90px, 0); transform: skew(0.2deg); }
            60% { clip: rect(50px, 9999px, 20px, 0); transform: skew(0.6deg); }
            80% { clip: rect(90px, 9999px, 40px, 0); transform: skew(0.1deg); }
            100% { clip: rect(30px, 9999px, 70px, 0); transform: skew(0.9deg); }
        }

        /* CRT SCANLINE EFFECT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glitch-container">
        <h1 class="error-code" data-text="404">404</h1>
    </div>

    <div class="msg-title">SYSTEM SIGNAL LOST</div>
    <p class="msg-desc">The requested file path has been corrupted or removed from the server database.</p>

    <a href="index.html" class="btn-home">RETURN TO BASE</a>

    <p class="redirect-msg">Auto-redirecting in <span id="countdown">5</span>s...</p>

    <script>
        // --- AUTO REDIRECT LOGIC ---
        let seconds = 5;
        const countSpan = document.getElementById('countdown');

        const timer = setInterval(() => {
            seconds--;
            countSpan.innerText = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = "index.html"; // হোম পেজে পাঠিয়ে দিবে
            }
        }, 1000);
    </script>

</body>
</html>
