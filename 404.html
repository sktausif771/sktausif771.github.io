            from {
                transform: translateY(100vh) scale(0);
            }
            to {
                transform: translateY(-100vh) scale(1);
            }
        }

        /* ==========================================================================
           Responsive Design Enhancements
           ========================================================================== */
        @media (max-width: 768px) {
            .error-universe {
                padding: 1rem;
            }
            
            .diagnostic-panel {
                padding: 1.5rem;
                margin: 1.5rem auto;
            }
            
            .nexus-button {
                padding: 1.2rem 2rem;
                font-size: 1rem;
                gap: 10px;
            }
            
            .countdown-display {
                font-size: 3rem;
            }
            
            .logo-cyber {
                width: 100px;
                height: 100px;
            }
        }

        @media (max-width: 480px) {
            .error-giant {
                font-size: clamp(100px, 25vw, 180px);
                letter-spacing: -4px;
            }
            
            .status-badge {
                padding: 0.5rem 1.5rem;
                font-size: 0.8rem;
                letter-spacing: 2px;
            }
            
            .log-line {
                font-size: 0.8rem;
            }
            
            .nexus-button {
                padding: 1rem 1.5rem;
                font-size: 0.9rem;
                width: 100%;
                max-width: 300px;
            }
        }

        /* High-end Displays */
        @media (min-width: 2000px) {
            .error-giant {
                font-size: 350px;
            }
            
            .logo-cyber {
                width: 180px;
                height: 180px;
            }
        }

        /* ==========================================================================
           Accessibility & Reduced Motion
           ========================================================================== */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ==========================================================================
           Custom Selection Color
           ========================================================================== */
        ::selection {
            background: var(--primary);
            color: var(--bg-void);
        }
        ::-moz-selection {
            background: var(--primary);
            color: var(--bg-void);
        }

        /* ==========================================================================
           Loading State for Async Operations
           ========================================================================== */
        .loading-state {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 10px;
        }

        /* ==========================================================================
           Tooltip for Extra Info
           ========================================================================== */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }

        [data-tooltip]:before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 5px 10px;
            background: var(--bg-elevated);
            color: var(--text-primary);
            font-size: 0.7rem;
            font-family: var(--font-mono);
            white-space: nowrap;
            border-radius: var(--radius-sm);
            border: var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
            z-index: var(--z-tooltip);
        }

        [data-tooltip]:hover:before {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Quantum Particle Background -->
    <div class="particle-field" id="particleField"></div>
    <div class="grid-overlay"></div>
    <div class="scanline-effect"></div>
    <div class="crt-effect"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <!-- Main 3D Container -->
    <div class="error-universe" id="parallaxCore">
        
        <!-- Base64 Logo Section - PASTE YOUR BASE64 CODE HERE -->
        <div class="logo-container">
            <div class="logo-cyber">
                <!-- ======================================================== -->
                <!-- IMPORTANT: PASTE YOUR BASE64 ENCODED LOGO BELOW          -->
                <!-- ======================================================== -->
                <!-- 
                    HOW TO USE:
                    1. Convert your logo to Base64 using any online tool
                    2. Copy the full data URL (starts with "data:image/...")
                    3. Replace the src value below with your Base64 string
                -->
                <img class="logo-img" 
                     src="data:image/png;base64,PASTE_YOUR_BASE64_STRING_HERE" 
                     alt="MVX Cyber Logo">
                <!-- 
                    EXAMPLE FORMAT (after replacement):
                    src="data:image/png;base64,iVBORw0KGgoAAAANS..."
                -->
            </div>
        </div>

        <!-- 404 Glitch Art -->
        <div class="glitch-monolith">
            <div class="error-giant" data-text="404">404</div>
        </div>

        <!-- Status Badge -->
        <div class="status-section">
            <div class="status-badge">
                <span class="pulse-dot"></span>
                <i class="fas fa-skull-crosswalk"></i> SYSTEM BREACH DETECTED
            </div>
        </div>

        <!-- Diagnostic Terminal -->
        <div class="diagnostic-panel">
            <div class="diagnostic-header">
                <i class="fas fa-terminal"></i> DIAGNOSTIC CONSOLE [ACTIVE]
                <span style="margin-left: auto; font-size: 0.7rem;">v4.0.4</span>
            </div>
            
            <div class="log-stream" id="logTerminal">
                <!-- Dynamic logs via JS -->
            </div>
            
            <div class="log-prompt">
                <span>root@mvx-nexus:~$</span>
                <span class="cursor-block"></span>
            </div>
        </div>

        <!-- Redirect Protocol -->
        <div class="redirect-protocol">
            <div class="countdown-display" id="countdownTimer">8</div>
            <div class="progress-arc">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="redirect-label">
                <i class="fas fa-shield-halved"></i> AUTO-REROUTE TO SAFE NEXUS
            </div>
        </div>

        <!-- Primary Action Button -->
        <div style="display: flex; justify-content: center;">
            <a href="index.html" class="nexus-button" id="manualRedirect">
                <i class="fas fa-satellite-dish"></i> FORCE RECONNECT
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ==========================================================================
            // CONFIGURATION
            // ==========================================================================
            const CONFIG = {
                redirectTime: 8,
                homeUrl: 'index.html',
                logEntries: [
                    { type: 'error', text: '404: Requested resource not found in nexus' },
                    { type: 'error', text: 'Connection to node 0x7F.0x00.0x00.0x01 timed out' },
                    { type: 'info', text: 'Scanning alternate routes...' },
                    { type: 'info', text: 'Bypassing corrupted sectors...' },
                    { type: 'error', text: 'Handshake failed: checksum mismatch' },
                    { type: 'success', text: 'Backup node located [MVX-CORE]' },
                    { type: 'info', text: 'Initiating emergency protocol...' },
                    { type: 'success', text: 'Redirect sequence armed' },
                    { type: 'info', text: 'Quantum encryption active' },
                    { type: 'error', text: 'Firewall breach attempt detected' },
                    { type: 'success', text: 'AI core rerouting traffic' }
                ]
            };

            // ==========================================================================
            // DOM ELEMENTS
            // ==========================================================================
            const timerElement = document.getElementById('countdownTimer');
            const progressFill = document.getElementById('progressFill');
            const logTerminal = document.getElementById('logTerminal');
            const manualBtn = document.getElementById('manualRedirect');
            const parallaxEl = document.getElementById('parallaxCore');

            let timeLeft = CONFIG.redirectTime;
            let timerInterval = null;
            let logIndex = 0;

            // ==========================================================================
            // INITIALIZATION
            // ==========================================================================
            function init() {
                if (!timerElement || !progressFill || !logTerminal) {
                    console.error('Critical DOM elements missing');
                    return;
                }

                progressFill.style.transform = 'scaleX(1)';
                
                startCountdown();
                startLogStream();
                initParallax();
                initParticles();
                
                if (manualBtn) {
                    manualBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        window.location.href = CONFIG.homeUrl;
                    });
                }
            }

            // ==========================================================================
            // COUNTDOWN & PROGRESS
            // ==========================================================================
            function startCountdown() {
                setTimeout(() => {
                    progressFill.style.transition = `transform ${CONFIG.redirectTime}s linear`;
                    progressFill.style.transform = 'scaleX(0)';
                }, 50);

                timerInterval = setInterval(() => {
                    timeLeft -= 1;
                    
                    if (timerElement) {
                        timerElement.textContent = timeLeft;
                    }

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        executeRedirect();
                    }
                }, 1000);
            }

            function executeRedirect() {
                clearInterval(timerInterval);
                window.location.href = CONFIG.homeUrl;
            }

            // ==========================================================================
            // LOG STREAM SIMULATOR
            // ==========================================================================
            function startLogStream() {
                if (!logTerminal) return;

                logTerminal.innerHTML = '';

                function addLog() {
                    if (logIndex >= CONFIG.logEntries.length) {
                        logIndex = 0;
                    }

                    const entry = CONFIG.logEntries[logIndex];
                    const logDiv = document.createElement('div');
                    logDiv.className = `log-line ${entry.type}`;
                    
                    let icon = '';
                    if (entry.type === 'error') icon = '❌';
                    else if (entry.type === 'success') icon = '✅';
                    else icon = 'ℹ️';
                    
                    logDiv.innerHTML = `<span>${icon}</span> ${entry.text}`;
                    
                    logTerminal.appendChild(logDiv);
                    logTerminal.scrollTop = logTerminal.scrollHeight;
                    
                    logIndex++;
                    
                    const nextDelay = Math.random() * 800 + 400;
                    setTimeout(addLog, nextDelay);
                }

                setTimeout(addLog, 300);
            }

            // ==========================================================================
            // 3D PARALLAX EFFECT
            // ==========================================================================
            function initParallax() {
                if (!parallaxEl) return;

                let rafId = null;
                let targetX = 0, targetY = 0;
                let currentX = 0, currentY = 0;

                function handleMouseMove(e) {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    
                    targetX = (centerX - e.pageX) / 40;
                    targetY = (centerY - e.pageY) / 40;
                }

                function updateParallax() {
                    currentX += (targetX - currentX) * 0.08;
                    currentY += (targetY - currentY) * 0.08;
                    
                    parallaxEl.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
                    
                    rafId = requestAnimationFrame(updateParallax);
                }

                function handleMouseLeave() {
                    targetX = 0;
                    targetY = 0;
                    
                    parallaxEl.style.transition = 'transform 0.5s ease';
                    parallaxEl.style.transform = 'rotateY(0deg) rotateX(0deg)';
                    
                    setTimeout(() => {
                        parallaxEl.style.transition = 'none';
                    }, 500);
                }

                document.addEventListener('mousemove', handleMouseMove, { passive: true });
                document.addEventListener('mouseleave', handleMouseLeave);
                
                rafId = requestAnimationFrame(updateParallax);

                window.cleanupParallax = () => {
                    if (rafId) cancelAnimationFrame(rafId);
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseleave', handleMouseLeave);
                };
            }

            // ==========================================================================
            // QUANTUM PARTICLE BACKGROUND
            // ==========================================================================
            function initParticles() {
                const particleField = document.getElementById('particleField');
                if (!particleField) return;

                const particleCount = 50;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    const size = Math.random() * 6 + 2;
                    const left = Math.random() * 100;
                    const delay = Math.random() * 20;
                    const duration = Math.random() * 10 + 15;
                    
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${left}%`;
                    particle.style.animationDelay = `${delay}s`;
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.opacity = Math.random() * 0.3 + 0.2;
                    
                    particleField.appendChild(particle);
                }
            }

            // ==========================================================================
            // START EVERYTHING
            // ==========================================================================
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            window.addEventListener('beforeunload', () => {
                if (typeof window.cleanupParallax === 'function') {
                    window.cleanupParallax();
                }
            });

        })();
    </script>
</body>
</html>
