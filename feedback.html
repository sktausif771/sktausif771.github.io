<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00e6b8">
    <title>Community Feedback | MVX STORE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ==========================================================================
           MVX STORE - FEEDBACK CHAT V4.0 (ORIGINAL UI + BUG FIXED + LIGHTBOX)
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #00e6b8; --primary-dim: rgba(0, 230, 184, 0.15);
            --gold: #ffd700; --danger: #ff003c; 
            --bg-void: #000000; --bg-card: #0c101a; --bg-input: #1a1f2c;
            --text-primary: #ffffff; --text-muted: #9ca3af;
            --glass-bg: rgba(8, 11, 18, 0.95); --glass-border: 1px solid rgba(0, 230, 184, 0.2);
            --font-head: 'Rajdhani', sans-serif; --font-body: 'Space Grotesk', sans-serif;
        }

        body { background: var(--bg-void); color: var(--text-primary); font-family: var(--font-body); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Navbar */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; background: var(--glass-bg); backdrop-filter: blur(10px); border-bottom: var(--glass-border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; height: 70px; }
        .back-btn { color: var(--text-primary); text-decoration: none; font-size: 1.2rem; background: var(--bg-input); width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 8px; border: 1px solid #333; transition: 0.3s; }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }
        .brand { font-family: var(--font-head); font-size: 1.4rem; font-weight: 700; color: var(--primary); letter-spacing: 1px; }

        /* Chat Container */
        .chat-container { flex: 1; overflow-y: auto; padding: 90px 20px 100px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .message-box { max-width: 85%; padding: 12px 15px; border-radius: 15px; position: relative; animation: fadeIn 0.3s ease; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Message Types */
        .msg-others { align-self: flex-start; background: var(--bg-card); border: 1px solid #333; border-bottom-left-radius: 2px; }
        .msg-mine { align-self: flex-end; background: var(--primary-dim); border: 1px solid var(--primary); border-bottom-right-radius: 2px; }
        .msg-owner { border-color: var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.1); }

        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.8rem; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 5px; gap: 15px;}
        .msg-name { font-weight: bold; color: var(--text-muted); }
        .msg-mine .msg-name { color: var(--primary); }
        
        .owner-badge { background: var(--gold); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; font-family: var(--font-head); letter-spacing: 1px; }
        .msg-time { font-size: 0.7rem; color: #666; white-space: nowrap; }

        .msg-text { font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; }
        
        /* Image Preview in Chat (Clickable) */
        .msg-image { max-width: 100%; height: auto; max-height: 250px; border-radius: 8px; margin-top: 8px; border: 1px solid #333; object-fit: cover; display: block; cursor: zoom-in; transition: 0.2s; }
        .msg-image:hover { opacity: 0.8; border-color: var(--primary); }

        .msg-actions { display: flex; gap: 12px; margin-top: 8px; justify-content: flex-end; opacity: 0.7; }
        .msg-actions button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .msg-actions button:hover { color: var(--primary); opacity: 1; }
        .btn-del:hover { color: var(--danger) !important; }
        .btn-block:hover { color: #ff9800 !important; }

        /* Fixed Input Area */
        .input-area { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); padding: 12px 15px; border-top: 1px solid #333; display: flex; gap: 10px; align-items: flex-end; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        
        .attach-btn { background: var(--bg-input); border: 1px solid #333; color: var(--text-primary); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .attach-btn:hover { border-color: var(--primary); color: var(--primary); }
        
        .textarea-wrapper { flex: 1; background: var(--bg-input); border: 1px solid #333; border-radius: 20px; padding: 5px 15px; position: relative; display: flex; flex-direction: column; justify-content: center; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; font-family: var(--font-body); resize: none; outline: none; padding: 10px 0; max-height: 100px; min-height: 24px; font-size: 1rem; }
        
        .img-preview-box { display: none; position: relative; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 1px dashed #444; width: fit-content; }
        .img-preview-box img { height: 50px; border-radius: 6px; border: 1px solid var(--primary); }
        .img-preview-box .remove-img { position: absolute; top: -8px; right: -8px; background: var(--danger); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; justify-content: center; align-items: center; }

        .send-btn { background: var(--primary); border: none; color: #000; width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; transition: 0.3s; }
        .send-btn:hover { box-shadow: 0 0 15px var(--primary-dim); transform: scale(1.05); }

        /* Login Prompt Layer (Guest View) */
        .login-prompt { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(12, 16, 26, 0.9); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 101; border-top: 1px solid var(--primary); }
        .login-prompt-btn { background: var(--primary); color: #000; border: none; padding: 12px 25px; border-radius: 8px; font-family: var(--font-head); font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .login-prompt-btn:hover { box-shadow: 0 0 20px var(--primary-dim); }

        /* Lightbox (Image Viewer) */
        .lightbox-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(5px); align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .lightbox-content { max-width: 95%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8); object-fit: contain; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 2.5rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .lightbox-close:hover { color: var(--danger); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="brand"><i class="fas fa-comments"></i> FEEDBACK</div>
        <div style="width: 40px;"></div>
    </nav>

    <div class="chat-container" id="chatContainer">
        <p style="text-align: center; color: gray; margin-top: 50px;"><i class="fas fa-circle-notch fa-spin"></i> Loading messages...</p>
    </div>

    <div class="input-area" id="inputAreaBox">
        <div class="login-prompt" id="loginPromptOverlay">
            <button class="login-prompt-btn" onclick="window.location.href='user-login.html?redirect=feedback.html'">লগইন করে মেসেজ দিন</button>
        </div>

        <input type="file" id="imageInput" accept="image/*" hidden onchange="handleImageSelect(this)">
        <button class="attach-btn" onclick="document.getElementById('imageInput').click()"><i class="fas fa-image"></i></button>
        
        <div class="textarea-wrapper">
            <div class="img-preview-box" id="imgPreviewBox">
                <img id="imgPreview" src="">
                <button class="remove-img" onclick="removeImage()">×</button>
            </div>
            <textarea id="messageInput" placeholder="Write a message..." oninput="autoResize(this)" rows="1"></textarea>
        </div>
        
        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <div id="lightboxModal" class="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightboxImg" onclick="event.stopPropagation()">
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAS3UXXrio_-c9uPbHwpDuTVrP-p8d903w",
            authDomain: "white-2k-17-v4.firebaseapp.com",
            databaseURL: "https://white-2k-17-v4-default-rtdb.firebaseio.com",
            projectId: "white-2k-17-v4",
            storageBucket: "white-2k-17-v4.firebasestorage.app",
            messagingSenderId: "180909174928",
            appId: "1:180909174928:android:148861a87d66c6980ca815"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.database();
        const DB_PATH = "community_feedbacks";

        let currentUser = null;
        let isOwner = false;
        let isBlocked = false;
        let myProfileName = "MVX User";
        let selectedBase64Image = "";
        let editMessageId = null;
        let lastMessageSentTime = 0; // For 30s Cooldown

        // Load Messages Immediately for Guests
        loadMessages();

        // Auth State Check
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginPromptOverlay').style.display = 'none';
                
                // Owner Check
                if(user.email === "sktausif771@gmail.com") {
                    isOwner = true;
                }

                // Fetch Custom Name
                db.ref('registered_users/' + user.uid).once('value').then(snap => {
                    if(snap.exists() && snap.val().name) myProfileName = snap.val().name;
                    else if(user.displayName) myProfileName = user.displayName;
                });

                // Block Check
                db.ref('blocked_users/' + user.uid).once('value').then(snap => {
                    if(snap.exists()) {
                        isBlocked = true;
                        document.getElementById('loginPromptOverlay').style.display = 'flex';
                        document.getElementById('loginPromptOverlay').innerHTML = `<h3 style="color:var(--danger);">You are Blocked</h3>`;
                    }
                });

            } else {
                currentUser = null;
                isOwner = false;
                document.getElementById('loginPromptOverlay').style.display = 'flex';
            }
        });

        // --- LOAD CHAT MESSAGES ---
        function loadMessages() {
            db.ref(DB_PATH).on('value', (snap) => {
                const data = snap.val();
                const container = document.getElementById('chatContainer');
                container.innerHTML = '';

                if(!data) {
                    container.innerHTML = `<p style="text-align:center; color:gray; margin-top:50px;">No messages yet. Be the first to say hi!</p>`;
                    return;
                }

                const msgArray = Object.entries(data).map(([id, val]) => ({ id, ...val })).sort((a,b) => a.timestamp - b.timestamp);

                msgArray.forEach(msg => {
                    const isMine = currentUser && (msg.uid === currentUser.uid);
                    let msgClass = isMine ? 'msg-mine' : 'msg-others';
                    
                    let displayName = msg.name || "User";
                    if(msg.email === "sktausif771@gmail.com") {
                        displayName = `<span class="owner-badge"><i class="fas fa-crown"></i> ADMIN</span>`;
                        msgClass += ' msg-owner';
                    }

                    // Onclick Lightbox Added Here
                    const imgHtml = msg.imageBase64 ? `<img src="${msg.imageBase64}" class="msg-image" onclick="openLightbox('${msg.imageBase64}')">` : '';

                    let actionHtml = '';
                    if(isMine && !isOwner) {
                        actionHtml = `
                            <div class="msg-actions">
                                <button onclick="editMsg('${msg.id}', '${encodeURIComponent(msg.text)}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-del" onclick="deleteMsg('${msg.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        `;
                    }
                    if(isOwner) {
                        let blockBtn = msg.uid !== (currentUser ? currentUser.uid : '') ? `<button class="btn-block" onclick="blockUser('${msg.uid}', '${msg.name}')" title="Block"><i class="fas fa-ban"></i></button>` : '';
                        actionHtml = `
                            <div class="msg-actions">
                                ${blockBtn}
                                <button class="btn-del" onclick="deleteMsg('${msg.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        `;
                    }

                    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    container.innerHTML += `
                        <div class="message-box ${msgClass}">
                            <div class="msg-header">
                                <span class="msg-name">${displayName}</span>
                                <span class="msg-time">${timeStr} ${msg.isEdited ? '(Edited)' : ''}</span>
                            </div>
                            <div class="msg-text">${msg.text}</div>
                            ${imgHtml}
                            ${actionHtml}
                        </div>
                    `;
                });

                // Auto Scroll to bottom
                setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100);
            });
        }

        // --- LIGHTBOX FUNCTIONS ---
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxModal').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightboxModal').style.display = 'none';
        }

        // --- SEND MESSAGE LOGIC (BUG FIXED) ---
        function sendMessage() {
            if(!currentUser) return;
            if(isBlocked) {
                alert("অ্যাডমিন আপনাকে ব্লক করেছে!");
                return;
            }

            const textInput = document.getElementById('messageInput');
            const text = textInput.value.trim();

            if(!text && !selectedBase64Image) return; // Empty msg block

            const sendBtn = document.getElementById('sendBtn');
            
            // Cooldown Check (30 seconds)
            if(!isOwner && !editMessageId) {
                const now = Date.now();
                if(now - lastMessageSentTime < 30000) {
                    const wait = Math.ceil((30000 - (now - lastMessageSentTime))/1000);
                    alert(`পরবর্তী মেসেজ পাঠাতে ${wait} সেকেন্ড অপেক্ষা করুন।`);
                    return;
                }
            }

            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            textInput.disabled = true;

            const msgData = {
                uid: currentUser.uid,
                email: currentUser.email,
                name: myProfileName,
                text: text,
                imageBase64: selectedBase64Image,
                timestamp: Date.now()
            };

            if(editMessageId) {
                db.ref(`${DB_PATH}/${editMessageId}`).update({ text: text, isEdited: true }).then(() => {
                    resetInput();
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    textInput.disabled = false;
                    textInput.focus();
                }).catch(err => {
                    alert("Error: " + err.message);
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    textInput.disabled = false;
                });
            } else {
                db.ref(DB_PATH).push(msgData).then(() => {
                    lastMessageSentTime = Date.now();
                    resetInput();
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    textInput.disabled = false;
                    textInput.focus();
                }).catch(err => {
                    alert("Error: " + err.message);
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    textInput.disabled = false;
                });
            }
        }

        // Edit / Delete / Block
        function deleteMsg(id) {
            if(confirm("মেসেজটি কি ডিলিট করতে চান?")) {
                db.ref(`${DB_PATH}/${id}`).remove();
            }
        }
        function blockUser(uid, name) {
            if(confirm(`${name} কে ব্লক করতে চান?`)) {
                db.ref('blocked_users/' + uid).set({ blockedAt: Date.now() });
            }
        }
        function editMsg(id, encodedText) {
            editMessageId = id;
            const textInput = document.getElementById('messageInput');
            textInput.value = decodeURIComponent(encodedText);
            textInput.focus();
            autoResize(textInput);
        }

        // --- IMAGE HANDLING ---
        function handleImageSelect(input) {
            const file = input.files[0];
            if(file) {
                if(file.size > 2 * 1024 * 1024) {
                    alert("২MB এর ছোট ছবি দিন!");
                    input.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedBase64Image = e.target.result;
                    document.getElementById('imgPreview').src = selectedBase64Image;
                    document.getElementById('imgPreviewBox').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            selectedBase64Image = "";
            document.getElementById('imageInput').value = "";
            document.getElementById('imgPreviewBox').style.display = 'none';
        }

        function resetInput() {
            const textInput = document.getElementById('messageInput');
            textInput.value = "";
            textInput.style.height = 'auto';
            editMessageId = null;
            removeImage();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }
    </script>
</body>
</html>
